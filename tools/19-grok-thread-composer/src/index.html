<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grok Thread Composer · xlOS</title>
<meta name="description" content="Write threads grounded in what's actually happening on X right now.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Inlined Cinnabar Glass token set for self-contained dev — keep in sync if the shared kit changes. -->
<style>
:root {
  /* Cinnabar palette */
  --cinnabar: #C73E1D;
  --cinnabar-light: #E03C31;
  --cinnabar-dark: #A82F14;
  --cinnabar-deep: #2A0A04;
  --cinnabar-glow: #ED5C45;

  /* Ink scale */
  --ink-0: #0D0D0D;
  --ink-50: #111113;
  --ink-100: #15151A;
  --ink-200: #1C1C22;
  --ink-300: #25252C;
  --ink-400: #36363D;
  --ink-700: #A1A1AA;
  --ink-800: #D4D4D8;
  --ink-900: #FAFAFA;

  /* Glass */
  --glass-surface: rgba(255, 255, 255, 0.04);
  --glass-surface-strong: rgba(255, 255, 255, 0.06);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-border-strong: rgba(255, 255, 255, 0.12);

  /* Gradients */
  --gradient-cinnabar: linear-gradient(135deg, #C73E1D 0%, #E03C31 100%);
  --gradient-cinnabar-text: linear-gradient(135deg, #ED5C45 0%, #C73E1D 100%);

  /* Glow */
  --glow-cinnabar: 0 0 20px rgba(199, 62, 29, 0.22);

  /* Typography */
  --font-sans: 'Geist', system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

  /* Radii */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 12px;

  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
  --transition-slow: 400ms ease;

  /* Spacing scale */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-6: 24px;
  --space-8: 32px;
  --space-12: 48px;
  --space-16: 64px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(199,62,29,0.10), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(42,10,4,0.55), transparent 60%),
    var(--ink-0);
  color: var(--ink-800);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, h4 {
  font-family: var(--font-sans);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
  color: var(--ink-900);
}
h1 { font-size: 48px; margin-bottom: var(--space-4); }
h2 { font-size: 32px; margin-bottom: var(--space-3); }
h3 { font-size: 22px; margin-bottom: var(--space-2); }

.gradient-text {
  background: var(--gradient-cinnabar-text);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  display: inline-block;
}
.cinnabar-text {
  background: var(--gradient-cinnabar-text);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.glass {
  background: var(--glass-surface);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid var(--glass-border);
  box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37), inset 0 1px 0 0 rgba(255,255,255,0.04);
}

.brand-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-6);
  border-bottom: 1px solid var(--glass-border);
  background: var(--glass-surface);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
}
.brand-mark {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-700);
}
.brand-mark .icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  background: var(--gradient-cinnabar);
  color: var(--ink-900);
  font-weight: 700;
  font-family: var(--font-sans);
  box-shadow: 0 0 12px rgba(199,62,29,0.35);
}
.brand-mark .name {
  background: var(--gradient-cinnabar-text);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: 700;
  letter-spacing: 0.18em;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: 10px 18px;
  background: transparent;
  border: 1px solid var(--cinnabar);
  border-radius: var(--radius-md);
  color: var(--cinnabar-light);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all var(--transition-fast);
}
.btn:hover { background: rgba(199,62,29,0.10); box-shadow: var(--glow-cinnabar); }
.btn-primary { background: var(--gradient-cinnabar); color: var(--ink-900); border-color: transparent; }
.btn-primary:hover { box-shadow: var(--glow-cinnabar); filter: brightness(1.08); }

.card {
  background: var(--glass-surface);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  transition: border-color var(--transition-base);
  box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37), inset 0 1px 0 0 rgba(255,255,255,0.04);
}
.card:hover { border-color: var(--glass-border-strong); }
.card-glow { border-color: var(--cinnabar); box-shadow: var(--glow-cinnabar); }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  background: rgba(199,62,29,0.10);
  border: 1px solid var(--cinnabar);
  border-radius: var(--radius-sm);
  color: var(--cinnabar-glow);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.input, .textarea {
  width: 100%;
  background: var(--glass-surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  color: var(--ink-900);
  font-family: var(--font-mono);
  font-size: 14px;
  transition: all var(--transition-fast);
}
.input:focus, .textarea:focus { outline: none; border-color: var(--cinnabar); box-shadow: var(--glow-cinnabar); }
.textarea { min-height: 120px; resize: vertical; font-family: var(--font-sans); }

.text-muted { color: var(--ink-700); opacity: 0.7; }
.text-secondary { color: var(--ink-700); }
.mono { font-family: var(--font-mono); }

@media (max-width: 768px) {
  h1 { font-size: 32px; }
  h2 { font-size: 24px; }
  h3 { font-size: 18px; }
  body { font-size: 14px; }
}
</style>
</head>
<body>

<!-- Stub shell. Real composer UI is TODO per SPEC.md "User journey" section. -->
<header class="brand-bar">
  <div class="brand-mark">
    <span class="icon">x</span>
    <span class="name">xlOS · tools</span>
  </div>
  <div class="brand-mark">
    <span class="badge mono">19</span>
    <span class="text-muted mono" style="font-size:11px;">grok-install family</span>
  </div>
</header>

<main style="max-width:960px; margin:0 auto; padding:48px 24px;">
  <h1 class="gradient-text">Grok Thread Composer</h1>
  <p class="text-secondary" style="font-size:18px; margin-top:8px;">
    Write threads grounded in what's actually happening on X right now.
  </p>

  <div id="app" class="card" style="margin-top:32px;">
    <p class="text-muted mono">
      Scaffold only. Implementation follows <a href="../SPEC.md">SPEC.md</a>.
    </p>
  </div>
</main>

<footer style="border-top:1px solid var(--glass-border); padding:24px; text-align:center; margin-top:64px;">
  <p class="text-muted mono" style="font-size:12px; letter-spacing:0.1em;">
    APACHE 2.0  ·  PART OF THE GROK-INSTALL FAMILY
  </p>
</footer>

<script type="module">
  import { ThreadComposer } from './main.js';
  const composer = new ThreadComposer({ mount: document.getElementById('app') });
  composer.main().catch((err) => {
    console.error('ThreadComposer failed to start:', err);
  });
</script>

</body>
</html>
