<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pre-Post Virality Scorer · xlOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ===== Cinnabar Glass tokens ===== */
:root {
  --cinnabar: #C73E1D;
  --cinnabar-light: #E03C31;
  --cinnabar-dark: #A82F14;
  --cinnabar-deep: #2A0A04;
  --cinnabar-glow: #ED5C45;
  --ink-0: #0D0D0D;
  --ink-50: #111113;
  --ink-100: #15151A;
  --ink-200: #1C1C22;
  --ink-300: #25252C;
  --ink-400: #36363D;
  --ink-700: #A1A1AA;
  --ink-800: #D4D4D8;
  --ink-900: #FAFAFA;
  --glass-surface: rgba(255, 255, 255, 0.04);
  --glass-surface-strong: rgba(255, 255, 255, 0.06);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-border-strong: rgba(255, 255, 255, 0.12);
  --gradient-cinnabar: linear-gradient(135deg, #C73E1D 0%, #E03C31 100%);
  --gradient-cinnabar-text: linear-gradient(135deg, #ED5C45 0%, #C73E1D 100%);
  --glow-cinnabar: 0 0 20px rgba(199, 62, 29, 0.22);
  --font-sans: 'Geist', system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 12px;
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
  --transition-slow: 400ms ease;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-6: 24px;
  --space-8: 32px;
  --space-12: 48px;
  --space-16: 64px;
}

/* ===== base ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(199,62,29,0.10), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(42,10,4,0.55), transparent 60%),
    var(--ink-0);
  color: var(--ink-800);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4 {
  font-family: var(--font-sans);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
  color: var(--ink-900);
}
h1 { font-size: 48px; margin-bottom: var(--space-4); }
h2 { font-size: 32px; margin-bottom: var(--space-3); }
h3 { font-size: 22px; margin-bottom: var(--space-2); }

/* ===== glass treatment ===== */
.glass {
  background: var(--glass-surface);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid var(--glass-border);
  box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37), inset 0 1px 0 0 rgba(255,255,255,0.04);
}
.glass-strong {
  background: var(--glass-surface-strong);
  backdrop-filter: blur(28px) saturate(160%);
  -webkit-backdrop-filter: blur(28px) saturate(160%);
  border: 1px solid var(--glass-border-strong);
}
.cinnabar-gradient { background: var(--gradient-cinnabar); color: var(--ink-900); }
.cinnabar-text {
  background: var(--gradient-cinnabar-text);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.gradient-text {
  background: var(--gradient-cinnabar-text);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  display: inline-block;
}

/* ===== brand bar ===== */
.brand-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-6);
  border-bottom: 1px solid var(--glass-border);
  background: var(--glass-surface);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
}
.brand-mark {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-700);
}
.brand-mark .icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  background: var(--gradient-cinnabar);
  color: var(--ink-900);
  font-weight: 700;
  font-family: var(--font-sans);
  box-shadow: 0 0 12px rgba(199,62,29,0.35);
}
.brand-mark .name {
  background: var(--gradient-cinnabar-text);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: 700;
  letter-spacing: 0.18em;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: 10px 18px;
  background: transparent;
  border: 1px solid var(--cinnabar);
  border-radius: var(--radius-md);
  color: var(--cinnabar-light);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all var(--transition-fast);
}
.btn:hover { background: rgba(199,62,29,0.10); box-shadow: var(--glow-cinnabar); }
.btn-primary { background: var(--gradient-cinnabar); color: var(--ink-900); border-color: transparent; }
.btn-primary:hover { box-shadow: var(--glow-cinnabar); filter: brightness(1.08); }

.card {
  background: var(--glass-surface);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  transition: border-color var(--transition-base);
  box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37), inset 0 1px 0 0 rgba(255,255,255,0.04);
}
.card:hover { border-color: var(--glass-border-strong); }
.card-glow { border-color: var(--cinnabar); box-shadow: var(--glow-cinnabar); }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  background: rgba(199,62,29,0.10);
  border: 1px solid var(--cinnabar);
  border-radius: var(--radius-sm);
  color: var(--cinnabar-glow);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.input, .textarea {
  width: 100%;
  background: var(--glass-surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  color: var(--ink-900);
  font-family: var(--font-mono);
  font-size: 14px;
  transition: all var(--transition-fast);
}
.input:focus, .textarea:focus {
  outline: none;
  border-color: var(--cinnabar);
  box-shadow: var(--glow-cinnabar);
}
.textarea { min-height: 120px; resize: vertical; font-family: var(--font-sans); }

.text-muted { color: var(--ink-700); opacity: 0.7; }
.text-secondary { color: var(--ink-700); }
.mono { font-family: var(--font-mono); }
@media (max-width: 768px) {
  h1 { font-size: 32px; }
  h2 { font-size: 24px; }
  h3 { font-size: 18px; }
  body { font-size: 14px; }
}

/* ===== Tool-specific ===== */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: var(--space-6);
  margin-top: var(--space-8);
}
.draft-area {
  min-height: 200px;
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.5;
}
.count-line {
  margin-top: var(--space-2);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-700);
  letter-spacing: 0.04em;
}
.arc-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.arc-svg { width: 240px; height: 240px; display: block; }
.arc-center {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.arc-inner { position: relative; display: flex; align-items: center; justify-content: center; }
.score-num {
  font-family: var(--font-mono);
  font-size: 72px;
  font-weight: 600;
  line-height: 1;
  background: var(--gradient-cinnabar-text);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.score-label {
  margin-top: var(--space-2);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--ink-700);
}
.dims {
  margin-top: var(--space-8);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-3);
}
.dim-row {
  display: grid;
  grid-template-columns: 140px 1fr 70px;
  align-items: center;
  gap: var(--space-4);
  padding: var(--space-3) var(--space-4);
  background: var(--glass-surface);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
}
.dim-label {
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-700);
}
.dim-bar {
  position: relative;
  height: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 999px;
  overflow: hidden;
}
.dim-bar-fill {
  position: absolute;
  inset: 0 auto 0 0;
  background: var(--gradient-cinnabar);
  border-radius: 999px;
  transition: width var(--transition-base);
}
.dim-score {
  font-family: var(--font-mono);
  font-size: 12px;
  text-align: right;
  color: var(--ink-900);
}
.suggestions {
  margin-top: var(--space-8);
}
.suggestions h3 {
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-700);
  margin-bottom: var(--space-4);
}
.sugg-list { display: flex; flex-direction: column; gap: var(--space-3); }
.sugg-row {
  display: flex;
  align-items: flex-start;
  gap: var(--space-3);
  padding: var(--space-3) 0;
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink-800);
}
.sugg-dot {
  flex-shrink: 0;
  width: 8px;
  height: 8px;
  margin-top: 8px;
  border-radius: 999px;
  background: var(--cinnabar-light);
  box-shadow: 0 0 8px rgba(224,60,49,0.6);
}
.sugg-empty { color: var(--ink-700); opacity: 0.7; font-style: italic; }

footer {
  margin-top: var(--space-16);
  padding: var(--space-6);
  border-top: 1px solid var(--glass-border);
  text-align: center;
  color: var(--ink-700);
  opacity: 0.7;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.1em;
}

@media (max-width: 860px) {
  .grid-2 { grid-template-columns: 1fr; }
  .arc-svg { width: 180px; height: 180px; }
  .score-num { font-size: 56px; }
  .dims { grid-template-columns: 1fr; }
  .dim-row { grid-template-columns: 110px 1fr 60px; }
}
</style>
</head>
<body>

<div class="brand-bar">
  <div class="brand-mark">
    <span class="icon">x</span>
    <span class="name">xlOS · tools</span>
  </div>
  <div class="brand-mark">
    <span class="badge">04</span>
    <span class="text-muted">grok-install family</span>
  </div>
</div>

<main style="max-width:1100px; margin:0 auto; padding:48px 24px;">
  <h1 class="gradient-text">Pre-Post Virality Scorer</h1>
  <p class="text-secondary" style="font-size:18px; margin-top:8px;">Score 0–100 with per-dimension breakdown.</p>

  <div class="grid-2">
    <div>
      <textarea id="draft" class="textarea draft-area" placeholder="Paste or type your draft post..."></textarea>
      <div class="count-line"><span id="charCount">0</span> characters &middot; <span id="wordCount">0</span> words</div>
    </div>
    <div class="arc-wrap">
      <div class="arc-inner">
        <svg class="arc-svg" viewBox="0 0 240 240" aria-hidden="true">
          <circle cx="120" cy="120" r="100" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="14"></circle>
          <circle id="arcFg" cx="120" cy="120" r="100" fill="none" stroke="#C73E1D" stroke-width="14"
            stroke-linecap="round"
            stroke-dasharray="628.3"
            stroke-dashoffset="628.3"
            transform="rotate(-90 120 120)"
            style="transition: stroke-dashoffset 400ms ease, stroke 300ms ease;"></circle>
        </svg>
        <div class="arc-center">
          <div id="scoreNum" class="score-num">0</div>
          <div class="score-label">VIRALITY</div>
        </div>
      </div>
    </div>
  </div>

  <div id="dims" class="dims"></div>

  <div class="suggestions">
    <h3>Suggestions</h3>
    <div id="suggList" class="sugg-list"></div>
  </div>
</main>

<footer>APACHE 2.0 &middot; PART OF THE GROK-INSTALL FAMILY</footer>

<script>
(function(){
  var POWER = ["nobody","stop","you're","never","always","here's","this is why","the truth","hot take","contrarian"];
  var EMOTIONS = ["curious","surprised","shocked","angry","hopeful","devastating","brilliant","terrifying","beautiful","broken","wild","insane","obvious","hidden","secret","forgotten","dangerous","powerful","simple","brutal","honest","raw","real","fake","lies","truth","finally","ruined","saved","magic","painful","joyful","lonely"];
  var MONTHS = ["january","february","march","april","may","june","july","august","september","october","november","december","jan","feb","mar","apr","jun","jul","aug","sep","sept","oct","nov","dec"];
  var DIMS = [
    { key: "hook", label: "Hook Strength", max: 25 },
    { key: "length", label: "Length", max: 15 },
    { key: "question", label: "Question", max: 10 },
    { key: "emotion", label: "Emotion", max: 20 },
    { key: "format", label: "Format", max: 15 },
    { key: "specificity", label: "Specificity", max: 15 }
  ];

  var draftEl = document.getElementById("draft");
  var charCountEl = document.getElementById("charCount");
  var wordCountEl = document.getElementById("wordCount");
  var scoreNumEl = document.getElementById("scoreNum");
  var arcFg = document.getElementById("arcFg");
  var dimsEl = document.getElementById("dims");
  var suggListEl = document.getElementById("suggList");

  // Build dimension rows once
  DIMS.forEach(function(d){
    var row = document.createElement("div");
    row.className = "dim-row";
    row.innerHTML =
      '<div class="dim-label">' + d.label + '</div>' +
      '<div class="dim-bar"><div class="dim-bar-fill" id="bar-' + d.key + '" style="width:0%"></div></div>' +
      '<div class="dim-score"><span id="score-' + d.key + '">0</span> / ' + d.max + '</div>';
    dimsEl.appendChild(row);
  });

  var CIRC = 2 * Math.PI * 100; // ~628.3

  function scoreHook(text) {
    if (!text) return 0;
    var words = text.trim().split(/\s+/);
    var first7 = words.slice(0, 7).join(" ").toLowerCase();
    var signals = 0;
    for (var i = 0; i < POWER.length; i++) {
      if (first7.indexOf(POWER[i]) !== -1) { signals++; break; }
    }
    if (words[0] && /^\d+/.test(words[0])) signals++;
    if (/\?\s*$/.test(text.trim())) signals++;
    return Math.min(signals * 10, 25);
  }

  function scoreLength(text) {
    var n = text.length;
    if (n === 0) return 0;
    if (n >= 70 && n <= 140) return 15;
    var dist = n < 70 ? (70 - n) : (n - 140);
    if (dist >= 80) return 0;
    return Math.max(0, Math.round(15 * (1 - dist / 80)));
  }

  function scoreQuestion(text) {
    if (!text) return 0;
    if (text.indexOf("?") !== -1) return 10;
    if (/^\s*(why|how|what|when)\b/i.test(text)) return 10;
    return 0;
  }

  function scoreEmotion(text) {
    if (!text) return 0;
    var count = 0;
    for (var i = 0; i < EMOTIONS.length; i++) {
      var re = new RegExp("\\b" + EMOTIONS[i] + "\\b", "i");
      if (re.test(text)) count++;
    }
    return { score: Math.min(count * 5, 20), count: count };
  }

  function scoreFormat(text) {
    if (!text) return 0;
    if (text.indexOf("\n") !== -1) return 15;
    var lines = text.split("\n");
    for (var i = 0; i < lines.length; i++) {
      var t = lines[i].trim();
      if (t.indexOf("-") === 0 || t.indexOf("→") === 0) return 15;
    }
    return 0;
  }

  function scoreSpecificity(text) {
    if (!text) return 0;
    if (/\d/.test(text)) return 15;
    // mid-sentence capitalized word (not first token)
    var tokens = text.split(/\s+/);
    for (var i = 1; i < tokens.length; i++) {
      var w = tokens[i].replace(/^[^A-Za-z]+/, "");
      if (w.length > 1 && /^[A-Z][a-z]/.test(w)) return 15;
    }
    var lower = text.toLowerCase();
    for (var m = 0; m < MONTHS.length; m++) {
      var re = new RegExp("\\b" + MONTHS[m] + "\\b");
      if (re.test(lower)) return 15;
    }
    return 0;
  }

  function colorFor(score) {
    if (score < 40) return "#A82F14";
    if (score <= 70) return "#C73E1D";
    return "#ED5C45";
  }

  function buildSuggestions(text, parts) {
    var out = [];
    if (parts.hook < 15) out.push("Strengthen your first 7 words. Try opening with a contrarian claim or a number.");
    if (text.length < 50) out.push("Too short — add specificity.");
    if (text.length > 200) out.push("Too long — cut filler. Or split into a thread.");
    var hasQ = text.indexOf("?") !== -1 || /^\s*(why|how|what|when)\b/i.test(text);
    if (!hasQ) out.push("Consider ending with a question to invite replies.");
    if (parts.emotionCount === 0) out.push("Add one emotional word — emotion drives shares.");
    if (parts.format === 0) out.push("Add line breaks. Walls of text get scrolled past.");
    if (parts.specificity === 0) out.push("Add a specific number — concrete beats abstract.");
    return out;
  }

  function compute() {
    var text = draftEl.value || "";
    var chars = text.length;
    var words = text.trim() ? text.trim().split(/\s+/).length : 0;
    charCountEl.textContent = chars;
    wordCountEl.textContent = words;

    var hook = scoreHook(text);
    var length = scoreLength(text);
    var question = scoreQuestion(text);
    var emo = scoreEmotion(text);
    var emotion = emo.score || 0;
    var format = scoreFormat(text);
    var specificity = scoreSpecificity(text);

    var parts = {
      hook: hook, length: length, question: question,
      emotion: emotion, format: format, specificity: specificity,
      emotionCount: emo.count || 0
    };

    var total = hook + length + question + emotion + format + specificity;
    if (total > 100) total = 100;

    scoreNumEl.textContent = total;
    var offset = CIRC * (1 - total / 100);
    arcFg.setAttribute("stroke-dashoffset", offset);
    arcFg.setAttribute("stroke", colorFor(total));

    DIMS.forEach(function(d){
      var val = parts[d.key];
      var pct = Math.round((val / d.max) * 100);
      document.getElementById("bar-" + d.key).style.width = pct + "%";
      document.getElementById("score-" + d.key).textContent = val;
    });

    var sugg = buildSuggestions(text, parts);
    suggListEl.innerHTML = "";
    if (text.trim() === "" || sugg.length === 0) {
      var empty = document.createElement("div");
      empty.className = "sugg-row sugg-empty";
      empty.textContent = text.trim() === "" ? "Type a draft to see suggestions." : "Nice draft. No changes recommended.";
      suggListEl.appendChild(empty);
    } else {
      sugg.forEach(function(s){
        var row = document.createElement("div");
        row.className = "sugg-row";
        row.innerHTML = '<span class="sugg-dot"></span><span>' + s + '</span>';
        suggListEl.appendChild(row);
      });
    }
  }

  var timer = null;
  draftEl.addEventListener("input", function(){
    if (timer) clearTimeout(timer);
    timer = setTimeout(compute, 120);
  });

  compute();
})();
</script>
</body>
</html>
