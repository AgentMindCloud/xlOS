<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>04 · Pre-Post Virality Scorer — x-platform-toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ===== tokens.css ===== */
:root {
  --bg-pure: #000000;
  --bg-soft: #0a0a0f;
  --bg-card: #111118;
  --bg-elevated: #16161f;
  --border-subtle: #1f1f2e;
  --border-glow: rgba(34, 211, 238, 0.2);
  --neon-cyan: #22d3ee;
  --neon-purple: #a855f7;
  --neon-magenta: #ec4899;
  --neon-lime: #a3e635;
  --neon-amber: #fbbf24;
  --text-primary: #ffffff;
  --text-secondary: #a1a1aa;
  --text-muted: #52525b;
  --gradient-primary: linear-gradient(135deg, #22d3ee 0%, #a855f7 100%);
  --gradient-magenta: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
  --gradient-warm: linear-gradient(135deg, #ec4899 0%, #fbbf24 100%);
  --glow-cyan: 0 0 20px rgba(34, 211, 238, 0.15);
  --glow-purple: 0 0 20px rgba(168, 85, 247, 0.15);
  --glow-magenta: 0 0 20px rgba(236, 72, 153, 0.15);
  --glow-lime: 0 0 20px rgba(163, 230, 53, 0.15);
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --font-body: 'Inter', system-ui, sans-serif;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
  --transition-slow: 400ms ease;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-6: 24px;
  --space-8: 32px;
  --space-12: 48px;
  --space-16: 64px;
}

/* ===== components.css ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg-pure);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.scanlines { position: relative; }
.scanlines::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent 0, transparent 2px,
    rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 3px);
  pointer-events: none;
}
h1, h2, h3, h4 {
  font-family: var(--font-display);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
}
h1 { font-size: 48px; margin-bottom: var(--space-4); }
h2 { font-size: 32px; margin-bottom: var(--space-3); }
h3 { font-size: 22px; margin-bottom: var(--space-2); }
.gradient-text {
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  display: inline-block;
}
.brand-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-6);
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-soft);
}
.brand-mark {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 500;
}
.brand-mark .icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border: 1px solid var(--neon-cyan);
  border-radius: var(--radius-sm);
  color: var(--neon-cyan);
  font-weight: 700;
}
.brand-mark .name {
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: 700;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: 10px 18px;
  background: transparent;
  border: 1px solid var(--neon-cyan);
  border-radius: var(--radius-md);
  color: var(--neon-cyan);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all var(--transition-fast);
}
.btn:hover { background: rgba(34,211,238,0.08); box-shadow: var(--glow-cyan); }
.btn-primary { background: var(--neon-cyan); color: var(--bg-pure); }
.btn-primary:hover { background: var(--neon-cyan); box-shadow: var(--glow-cyan); filter: brightness(1.1); }
.btn-purple { border-color: var(--neon-purple); color: var(--neon-purple); }
.btn-purple:hover { background: rgba(168,85,247,0.08); box-shadow: var(--glow-purple); }
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  transition: border-color var(--transition-base);
}
.card:hover { border-color: var(--border-glow); }
.card-glow { border-color: var(--neon-cyan); box-shadow: var(--glow-cyan); }
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  background: rgba(34,211,238,0.08);
  border: 1px solid var(--neon-cyan);
  border-radius: var(--radius-sm);
  color: var(--neon-cyan);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.badge-purple { background: rgba(168,85,247,0.08); border-color: var(--neon-purple); color: var(--neon-purple); }
.badge-magenta { background: rgba(236,72,153,0.08); border-color: var(--neon-magenta); color: var(--neon-magenta); }
.badge-lime { background: rgba(163,230,53,0.08); border-color: var(--neon-lime); color: var(--neon-lime); }
.input, .textarea {
  width: 100%;
  background: var(--bg-soft);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 14px;
  transition: all var(--transition-fast);
}
.input:focus, .textarea:focus {
  outline: none;
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-cyan);
}
.textarea { min-height: 120px; resize: vertical; font-family: var(--font-body); }
.table { width: 100%; border-collapse: collapse; font-size: 14px; }
.table th {
  text-align: left;
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.table td { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border-subtle); }
.table tr:hover td { background: var(--bg-elevated); }
.text-muted { color: var(--text-muted); }
.text-secondary { color: var(--text-secondary); }
.mono { font-family: var(--font-mono); }
@media (max-width: 768px) {
  h1 { font-size: 32px; }
  h2 { font-size: 24px; }
  h3 { font-size: 18px; }
  body { font-size: 14px; }
}

/* ===== Tool-specific ===== */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: var(--space-6);
  margin-top: var(--space-8);
}
.draft-area {
  min-height: 200px;
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
}
.count-line {
  margin-top: var(--space-2);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}
.arc-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.arc-svg { width: 240px; height: 240px; display: block; }
.arc-center {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.arc-inner { position: relative; display: flex; align-items: center; justify-content: center; }
.score-num {
  font-family: var(--font-display);
  font-size: 72px;
  font-weight: 700;
  line-height: 1;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.score-label {
  margin-top: var(--space-2);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--text-secondary);
}
.dims {
  margin-top: var(--space-8);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-3);
}
.dim-row {
  display: grid;
  grid-template-columns: 140px 1fr 70px;
  align-items: center;
  gap: var(--space-4);
  padding: var(--space-3) var(--space-4);
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
}
.dim-label {
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
}
.dim-bar {
  position: relative;
  height: 8px;
  background: #1f1f2e;
  border-radius: 999px;
  overflow: hidden;
}
.dim-bar-fill {
  position: absolute;
  inset: 0 auto 0 0;
  background: var(--gradient-primary);
  border-radius: 999px;
  transition: width var(--transition-base);
}
.dim-score {
  font-family: var(--font-mono);
  font-size: 12px;
  text-align: right;
  color: var(--text-primary);
}
.suggestions {
  margin-top: var(--space-8);
}
.suggestions h3 {
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: var(--space-4);
}
.sugg-list { display: flex; flex-direction: column; gap: var(--space-3); }
.sugg-row {
  display: flex;
  align-items: flex-start;
  gap: var(--space-3);
  padding: var(--space-3) 0;
  font-size: 15px;
  line-height: 1.5;
}
.sugg-dot {
  flex-shrink: 0;
  width: 8px;
  height: 8px;
  margin-top: 8px;
  border-radius: 999px;
  background: var(--neon-magenta);
  box-shadow: 0 0 8px rgba(236,72,153,0.6);
}
.sugg-empty { color: var(--text-muted); font-style: italic; }

footer {
  margin-top: var(--space-16);
  padding: var(--space-6);
  border-top: 1px solid var(--border-subtle);
  text-align: center;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.1em;
}

@media (max-width: 860px) {
  .grid-2 { grid-template-columns: 1fr; }
  .arc-svg { width: 180px; height: 180px; }
  .score-num { font-size: 56px; }
  .dims { grid-template-columns: 1fr; }
  .dim-row { grid-template-columns: 110px 1fr 60px; }
}
</style>
</head>
<body>

<div class="brand-bar">
  <div class="brand-mark">
    <span class="icon">X</span>
    <span class="name">x-platform-toolkit</span>
  </div>
  <div class="brand-mark">
    <span class="badge">04</span>
    <span class="text-muted">grok-install family</span>
  </div>
</div>

<main style="max-width:1100px; margin:0 auto; padding:48px 24px;">
  <h1 class="gradient-text">Pre-Post Virality Scorer</h1>
  <p class="text-secondary" style="font-size:18px; margin-top:8px;">Score 0–100 with per-dimension breakdown.</p>

  <div class="grid-2">
    <div>
      <textarea id="draft" class="textarea draft-area" placeholder="Paste or type your draft post..."></textarea>
      <div class="count-line"><span id="charCount">0</span> characters &middot; <span id="wordCount">0</span> words</div>
    </div>
    <div class="arc-wrap">
      <div class="arc-inner">
        <svg class="arc-svg" viewBox="0 0 240 240" aria-hidden="true">
          <circle cx="120" cy="120" r="100" fill="none" stroke="#1f1f2e" stroke-width="14"></circle>
          <circle id="arcFg" cx="120" cy="120" r="100" fill="none" stroke="#22d3ee" stroke-width="14"
            stroke-linecap="round"
            stroke-dasharray="628.3"
            stroke-dashoffset="628.3"
            transform="rotate(-90 120 120)"
            style="transition: stroke-dashoffset 400ms ease, stroke 300ms ease;"></circle>
        </svg>
        <div class="arc-center">
          <div id="scoreNum" class="score-num">0</div>
          <div class="score-label">VIRALITY</div>
        </div>
      </div>
    </div>
  </div>

  <div id="dims" class="dims"></div>

  <div class="suggestions">
    <h3>Suggestions</h3>
    <div id="suggList" class="sugg-list"></div>
  </div>
</main>

<footer>APACHE 2.0 &middot; PART OF THE GROK-INSTALL FAMILY</footer>

<script>
(function(){
  var POWER = ["nobody","stop","you're","never","always","here's","this is why","the truth","hot take","contrarian"];
  var EMOTIONS = ["curious","surprised","shocked","angry","hopeful","devastating","brilliant","terrifying","beautiful","broken","wild","insane","obvious","hidden","secret","forgotten","dangerous","powerful","simple","brutal","honest","raw","real","fake","lies","truth","finally","ruined","saved","magic","painful","joyful","lonely"];
  var MONTHS = ["january","february","march","april","may","june","july","august","september","october","november","december","jan","feb","mar","apr","jun","jul","aug","sep","sept","oct","nov","dec"];
  var DIMS = [
    { key: "hook", label: "Hook Strength", max: 25 },
    { key: "length", label: "Length", max: 15 },
    { key: "question", label: "Question", max: 10 },
    { key: "emotion", label: "Emotion", max: 20 },
    { key: "format", label: "Format", max: 15 },
    { key: "specificity", label: "Specificity", max: 15 }
  ];

  var draftEl = document.getElementById("draft");
  var charCountEl = document.getElementById("charCount");
  var wordCountEl = document.getElementById("wordCount");
  var scoreNumEl = document.getElementById("scoreNum");
  var arcFg = document.getElementById("arcFg");
  var dimsEl = document.getElementById("dims");
  var suggListEl = document.getElementById("suggList");

  // Build dimension rows once
  DIMS.forEach(function(d){
    var row = document.createElement("div");
    row.className = "dim-row";
    row.innerHTML =
      '<div class="dim-label">' + d.label + '</div>' +
      '<div class="dim-bar"><div class="dim-bar-fill" id="bar-' + d.key + '" style="width:0%"></div></div>' +
      '<div class="dim-score"><span id="score-' + d.key + '">0</span> / ' + d.max + '</div>';
    dimsEl.appendChild(row);
  });

  var CIRC = 2 * Math.PI * 100; // ~628.3

  function scoreHook(text) {
    if (!text) return 0;
    var words = text.trim().split(/\s+/);
    var first7 = words.slice(0, 7).join(" ").toLowerCase();
    var signals = 0;
    for (var i = 0; i < POWER.length; i++) {
      if (first7.indexOf(POWER[i]) !== -1) { signals++; break; }
    }
    if (words[0] && /^\d+/.test(words[0])) signals++;
    if (/\?\s*$/.test(text.trim())) signals++;
    return Math.min(signals * 10, 25);
  }

  function scoreLength(text) {
    var n = text.length;
    if (n === 0) return 0;
    if (n >= 70 && n <= 140) return 15;
    var dist = n < 70 ? (70 - n) : (n - 140);
    if (dist >= 80) return 0;
    return Math.max(0, Math.round(15 * (1 - dist / 80)));
  }

  function scoreQuestion(text) {
    if (!text) return 0;
    if (text.indexOf("?") !== -1) return 10;
    if (/^\s*(why|how|what|when)\b/i.test(text)) return 10;
    return 0;
  }

  function scoreEmotion(text) {
    if (!text) return 0;
    var count = 0;
    for (var i = 0; i < EMOTIONS.length; i++) {
      var re = new RegExp("\\b" + EMOTIONS[i] + "\\b", "i");
      if (re.test(text)) count++;
    }
    return { score: Math.min(count * 5, 20), count: count };
  }

  function scoreFormat(text) {
    if (!text) return 0;
    if (text.indexOf("\n") !== -1) return 15;
    var lines = text.split("\n");
    for (var i = 0; i < lines.length; i++) {
      var t = lines[i].trim();
      if (t.indexOf("-") === 0 || t.indexOf("→") === 0) return 15;
    }
    return 0;
  }

  function scoreSpecificity(text) {
    if (!text) return 0;
    if (/\d/.test(text)) return 15;
    // mid-sentence capitalized word (not first token)
    var tokens = text.split(/\s+/);
    for (var i = 1; i < tokens.length; i++) {
      var w = tokens[i].replace(/^[^A-Za-z]+/, "");
      if (w.length > 1 && /^[A-Z][a-z]/.test(w)) return 15;
    }
    var lower = text.toLowerCase();
    for (var m = 0; m < MONTHS.length; m++) {
      var re = new RegExp("\\b" + MONTHS[m] + "\\b");
      if (re.test(lower)) return 15;
    }
    return 0;
  }

  function colorFor(score) {
    if (score < 40) return "#fbbf24";
    if (score <= 70) return "#22d3ee";
    return "#a3e635";
  }

  function buildSuggestions(text, parts) {
    var out = [];
    if (parts.hook < 15) out.push("Strengthen your first 7 words. Try opening with a contrarian claim or a number.");
    if (text.length < 50) out.push("Too short — add specificity.");
    if (text.length > 200) out.push("Too long — cut filler. Or split into a thread.");
    var hasQ = text.indexOf("?") !== -1 || /^\s*(why|how|what|when)\b/i.test(text);
    if (!hasQ) out.push("Consider ending with a question to invite replies.");
    if (parts.emotionCount === 0) out.push("Add one emotional word — emotion drives shares.");
    if (parts.format === 0) out.push("Add line breaks. Walls of text get scrolled past.");
    if (parts.specificity === 0) out.push("Add a specific number — concrete beats abstract.");
    return out;
  }

  function compute() {
    var text = draftEl.value || "";
    var chars = text.length;
    var words = text.trim() ? text.trim().split(/\s+/).length : 0;
    charCountEl.textContent = chars;
    wordCountEl.textContent = words;

    var hook = scoreHook(text);
    var length = scoreLength(text);
    var question = scoreQuestion(text);
    var emo = scoreEmotion(text);
    var emotion = emo.score || 0;
    var format = scoreFormat(text);
    var specificity = scoreSpecificity(text);

    var parts = {
      hook: hook, length: length, question: question,
      emotion: emotion, format: format, specificity: specificity,
      emotionCount: emo.count || 0
    };

    var total = hook + length + question + emotion + format + specificity;
    if (total > 100) total = 100;

    scoreNumEl.textContent = total;
    var offset = CIRC * (1 - total / 100);
    arcFg.setAttribute("stroke-dashoffset", offset);
    arcFg.setAttribute("stroke", colorFor(total));

    DIMS.forEach(function(d){
      var val = parts[d.key];
      var pct = Math.round((val / d.max) * 100);
      document.getElementById("bar-" + d.key).style.width = pct + "%";
      document.getElementById("score-" + d.key).textContent = val;
    });

    var sugg = buildSuggestions(text, parts);
    suggListEl.innerHTML = "";
    if (text.trim() === "" || sugg.length === 0) {
      var empty = document.createElement("div");
      empty.className = "sugg-row sugg-empty";
      empty.textContent = text.trim() === "" ? "Type a draft to see suggestions." : "Nice draft. No changes recommended.";
      suggListEl.appendChild(empty);
    } else {
      sugg.forEach(function(s){
        var row = document.createElement("div");
        row.className = "sugg-row";
        row.innerHTML = '<span class="sugg-dot"></span><span>' + s + '</span>';
        suggListEl.appendChild(row);
      });
    }
  }

  var timer = null;
  draftEl.addEventListener("input", function(){
    if (timer) clearTimeout(timer);
    timer = setTimeout(compute, 120);
  });

  compute();
})();
</script>
</body>
</html>
