<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" role="img" aria-labelledby="banner-title banner-desc">
  <title id="banner-title">grok-install — The open standard for one-click installable Grok-native agents on X</title>
  <desc id="banner-desc">Spectral hero banner — Plasma + Aurora nebula on a deep #0A0A0A field with halftone dots, drifting circles, and a pulsing swarm node ring.</desc>
  <defs>
    <radialGradient id="hero-plasma" cx="22%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#FF1E70" stop-opacity="0.32"/>
      <stop offset="50%" stop-color="#FF1E70" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF1E70" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hero-aurora" cx="82%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#00E0D5" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#00E0D5" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00E0D5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="repo-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF1E70"/>
      <stop offset="100%" stop-color="#00E0D5"/>
    </linearGradient>
    <linearGradient id="hero-divider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF1E70" stop-opacity="0"/>
      <stop offset="35%" stop-color="#FF1E70" stop-opacity="0.7"/>
      <stop offset="65%" stop-color="#00E0D5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00E0D5" stop-opacity="0"/>
    </linearGradient>
    <pattern id="hero-halftone" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FFFFFF" fill-opacity="0.05"/>
    </pattern>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1500" height="500" fill="#0A0A0A"/>
  <rect width="1500" height="500" fill="url(#hero-halftone)"/>
  <rect width="1500" height="500" fill="url(#hero-plasma)"/>
  <rect width="1500" height="500" fill="url(#hero-aurora)"/>

  <g transform="translate(60, 56)">
    <rect x="-2" y="-14" width="3" height="20" fill="#FF1E70"/>
    <text x="12" y="2" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#FF1E70" letter-spacing="3.5">GROKINSTALL</text>
    <text x="12" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#E5E5E5" opacity="0.55" letter-spacing="2">SPECTRAL · ECOSYSTEM</text>
  </g>

  <g transform="translate(60, 230)">
    <text x="0" y="0" font-family="'JetBrains Mono', 'SF Mono', Consolas, monospace" font-size="84" font-weight="700" fill="url(#repo-text)" letter-spacing="-1.5" filter="url(#neon-glow)">grok-install</text>
    <text x="0" y="59" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#E5E5E5" opacity="0.88">The open standard for one-click installable Grok-native agents on X</text>
  </g>

  <g transform="translate(60, 410)">
    <g>
      <rect rx="4" width="172" height="28" fill="#FF1E70" fill-opacity="0.10" stroke="#FF1E70" stroke-opacity="0.55" stroke-width="1"/>
      <circle cx="14" cy="14" r="3" fill="#FF1E70"/>
      <text x="94" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#FF1E70" text-anchor="middle" letter-spacing="2">GROK 4.20 NATIVE</text>
    </g>
    <g transform="translate(184, 0)">
      <rect rx="4" width="172" height="28" fill="#00E0D5" fill-opacity="0.10" stroke="#00E0D5" stroke-opacity="0.55" stroke-width="1"/>
      <circle cx="14" cy="14" r="3" fill="#00E0D5"/>
      <text x="94" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#00E0D5" text-anchor="middle" letter-spacing="2">SAFETY CERTIFIED</text>
    </g>
  </g>

  <g>
    <circle cx="1300" cy="250" r="80" fill="none" stroke="#FF1E70" stroke-width="1" stroke-opacity="0.7"/>
    <circle cx="1300" cy="250" r="100" fill="none" stroke="#00E0D5" stroke-width="0.6" stroke-dasharray="2 6" opacity="0.55"/>
    <circle cx="1300" cy="250" r="140" fill="none" stroke="#FF1E70" stroke-width="0.6" stroke-dasharray="2 8" opacity="0.30"/>
    <line x1="1300" y1="250" x2="1200" y2="160" stroke="#FF1E70" stroke-width="0.6" stroke-opacity="0.45"/>
    <line x1="1300" y1="250" x2="1400" y2="160" stroke="#FF1E70" stroke-width="0.6" stroke-opacity="0.45"/>
    <line x1="1300" y1="250" x2="1200" y2="340" stroke="#00E0D5" stroke-width="0.6" stroke-opacity="0.45"/>
    <line x1="1300" y1="250" x2="1400" y2="340" stroke="#00E0D5" stroke-width="0.6" stroke-opacity="0.45"/>
    <line x1="1300" y1="250" x2="1180" y2="250" stroke="#FF1E70" stroke-width="0.6" stroke-opacity="0.45"/>
    <line x1="1300" y1="250" x2="1420" y2="250" stroke="#00E0D5" stroke-width="0.6" stroke-opacity="0.45"/>
    <circle cx="1200" cy="160" r="5" fill="#00E0D5" filter="url(#neon-glow)"/>
    <circle cx="1400" cy="160" r="5" fill="#00E0D5" filter="url(#neon-glow)"/>
    <circle cx="1200" cy="340" r="5" fill="#00E0D5" filter="url(#neon-glow)"/>
    <circle cx="1400" cy="340" r="5" fill="#00E0D5" filter="url(#neon-glow)"/>
    <circle cx="1180" cy="250" r="4" fill="#FF1E70" opacity="0.85"/>
    <circle cx="1420" cy="250" r="4" fill="#FF1E70" opacity="0.85"/>
    <circle cx="1300" cy="250" r="14" fill="#FF1E70" filter="url(#neon-glow)"/>
    <circle cx="1300" cy="250" r="6" fill="#FFFFFF"/>
  </g>

  <line x1="0" y1="488" x2="1500" y2="488" stroke="url(#hero-divider)" stroke-width="1"/>
  <text x="1440" y="478" font-family="Inter, sans-serif" font-size="10" font-weight="400" fill="#FFFFFF" opacity="0.32" text-anchor="end" letter-spacing="0.5">Built for Grok on X · Independent community project</text>
</svg>
