<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>xlOS Browser Extension — Options</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Cinnabar Glass tokens */
        --cinnabar: #C73E1D;
        --cinnabar-light: #E03C31;
        --cinnabar-dark: #A82F14;
        --cinnabar-glow: #ED5C45;
        --ink-0: #0D0D0D;
        --ink-100: #15151A;
        --ink-200: #1C1C22;
        --ink-700: #A1A1AA;
        --ink-800: #D4D4D8;
        --ink-900: #FAFAFA;
        --glass-surface: rgba(255, 255, 255, 0.04);
        --glass-surface-strong: rgba(255, 255, 255, 0.06);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-border-strong: rgba(255, 255, 255, 0.12);

        --ui-bg: var(--ink-0);
        --ui-accent: var(--cinnabar);
        --ui-fg: var(--ink-900);
        --ui-highlight: var(--cinnabar-glow);
        --g-sans: "Geist", system-ui, -apple-system, "Segoe UI", sans-serif;
        --g-mono: "IBM Plex Mono", ui-monospace, SFMono-Regular,
          "Cascadia Mono", Menlo, monospace;
      }
      html,
      body {
        background:
          radial-gradient(800px 400px at 100% 0%, rgba(199, 62, 29, 0.12), transparent 60%),
          radial-gradient(600px 400px at 0% 100%, rgba(42, 10, 4, 0.55), transparent 60%),
          var(--ui-bg);
        color: var(--ui-fg);
        font-family: var(--g-sans);
        font-size: 13px;
        margin: 0;
        padding: 28px;
        line-height: 1.5;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      h1 {
        background: linear-gradient(135deg, #ED5C45 0%, #C73E1D 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-family: var(--g-sans);
        font-weight: 700;
        font-size: 20px;
        letter-spacing: -0.01em;
        margin: 0 0 4px;
      }
      .g-tagline {
        color: var(--ink-700);
        opacity: 0.85;
        font-family: var(--g-mono);
        font-size: 11px;
        letter-spacing: 0.04em;
        margin: 0 0 24px;
      }
      .g-form {
        max-width: 640px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      fieldset {
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 14px 16px;
        background: var(--glass-surface);
        backdrop-filter: blur(20px) saturate(140%);
        -webkit-backdrop-filter: blur(20px) saturate(140%);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37),
          inset 0 1px 0 0 rgba(255, 255, 255, 0.04);
      }
      legend {
        color: var(--ink-700);
        font-family: var(--g-mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 0 6px;
      }
      label {
        display: block;
        margin-top: 6px;
        font-size: 12px;
        color: var(--ink-800);
      }
      input[type="text"] {
        width: 100%;
        background: var(--glass-surface-strong);
        color: var(--ink-900);
        border: 1px solid var(--glass-border);
        border-radius: 6px;
        padding: 8px 10px;
        font-family: var(--g-mono);
        font-size: 12px;
        transition: border-color 150ms ease, box-shadow 150ms ease;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: var(--cinnabar);
        box-shadow: 0 0 16px rgba(199, 62, 29, 0.22);
      }
      code {
        font-family: var(--g-mono);
        background: var(--glass-surface-strong);
        padding: 1px 5px;
        border-radius: 3px;
        color: var(--cinnabar-glow);
      }
      small {
        color: var(--ink-700);
        opacity: 0.85;
        font-size: 11px;
      }
      .g-radio,
      .g-check {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-top: 6px;
      }
      .g-radio input,
      .g-check input {
        margin-top: 3px;
        accent-color: var(--cinnabar);
      }
      .g-actions {
        display: flex;
        gap: 10px;
      }
      .g-btn {
        font-family: var(--g-mono);
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.04em;
        padding: 9px 18px;
        border-radius: 6px;
        cursor: pointer;
        transition: filter 120ms ease, box-shadow 120ms ease, color 120ms ease,
          border-color 120ms ease;
      }
      .g-btn-primary {
        background: linear-gradient(135deg, #C73E1D 0%, #E03C31 100%);
        color: var(--ink-900);
        border: 1px solid transparent;
        box-shadow: 0 0 12px rgba(199, 62, 29, 0.22);
      }
      .g-btn-primary:hover,
      .g-btn-primary:focus {
        filter: brightness(1.08);
        box-shadow: 0 0 18px rgba(199, 62, 29, 0.34);
        outline: none;
      }
      .g-btn-secondary {
        background: transparent;
        color: var(--ink-800);
        border: 1px solid var(--glass-border-strong);
      }
      .g-btn-secondary:hover,
      .g-btn-secondary:focus {
        border-color: var(--cinnabar);
        color: var(--cinnabar-glow);
        outline: none;
      }
      .g-status {
        font-family: var(--g-mono);
        font-size: 11px;
        color: var(--cinnabar-glow);
        min-height: 1.4em;
      }
      .g-status.error {
        color: var(--cinnabar-light);
      }
      footer {
        margin-top: 32px;
        padding-top: 14px;
        border-top: 1px solid var(--glass-border);
        font-family: var(--g-mono);
        font-size: 11px;
        color: var(--ink-700);
        opacity: 0.85;
        letter-spacing: 0.04em;
      }
      a {
        color: var(--cinnabar-light);
      }
      a:hover,
      a:focus {
        color: var(--cinnabar-glow);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>xlOS Browser Extension — Options</h1>
      <p class="g-tagline">
        Detect v2.15 manifest YAML on X and trigger an xlOS install.
      </p>
    </header>

    <form id="g-options-form" class="g-form" novalidate>
      <fieldset>
        <legend>Install path</legend>
        <label for="g-install-path">
          Default install location for new agents
        </label>
        <input
          type="text"
          id="g-install-path"
          name="install_path"
          autocomplete="off"
          spellcheck="false"
          aria-describedby="g-install-path-help"
        />
        <small id="g-install-path-help">
          Default: <code>$env:LOCALAPPDATA\xlos\agents</code>
        </small>
      </fieldset>

      <fieldset>
        <legend>Notifications</legend>
        <div class="g-check">
          <input type="checkbox" id="g-notifications" name="notifications" />
          <label for="g-notifications">
            Show desktop notifications when an install completes
          </label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Preferred install method</legend>
        <div class="g-radio">
          <input
            type="radio"
            id="g-method-stdin"
            name="install_method"
            value="cli-stdin"
          />
          <label for="g-method-stdin">
            CLI stdin pipe (paste manifest into a running shell)
          </label>
        </div>
        <div class="g-radio">
          <input
            type="radio"
            id="g-method-oneliner"
            name="install_method"
            value="one-liner"
          />
          <label for="g-method-oneliner">
            Copy a one-liner CLI command to the clipboard
          </label>
        </div>
        <div class="g-radio">
          <input
            type="radio"
            id="g-method-url"
            name="install_method"
            value="manifest-url"
          />
          <label for="g-method-url">
            Open a manifest URL in <code>xlos install &lt;url&gt;</code>
          </label>
        </div>
      </fieldset>

      <div class="g-actions">
        <button
          type="button"
          id="g-save-btn"
          class="g-btn g-btn-primary"
          aria-label="Save options"
        >
          Save
        </button>
        <button
          type="button"
          id="g-reset-btn"
          class="g-btn g-btn-secondary"
          aria-label="Reset to defaults"
        >
          Reset
        </button>
      </div>
      <p
        id="g-status"
        class="g-status"
        role="status"
        aria-live="polite"
      ></p>
    </form>

    <footer>
      <p>
        Apache-2.0.
        <a
          href="https://github.com/AgentMindCloud/xlOS"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub</a
        >
      </p>
    </footer>

    <script src="options.js"></script>
  </body>
</html>
