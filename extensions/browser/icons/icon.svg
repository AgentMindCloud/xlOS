<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="xlOS">
  <rect width="128" height="128" rx="22" ry="22" fill="#1A1A1A"/>

  <!-- Parchment cog accent, behind the G -->
  <g transform="translate(64 64)" fill="#F4E9D8" opacity="0.18">
    <circle r="44"/>
    <g>
      <rect x="-6" y="-54" width="12" height="14" rx="2"/>
      <rect x="-6" y="40"  width="12" height="14" rx="2"/>
      <rect x="-54" y="-6" width="14" height="12" rx="2"/>
      <rect x="40"  y="-6" width="14" height="12" rx="2"/>
      <rect x="-44" y="-44" width="14" height="12" rx="2" transform="rotate(-45 -37 -38)"/>
      <rect x="30"  y="-44" width="14" height="12" rx="2" transform="rotate(45 37 -38)"/>
      <rect x="-44" y="32"  width="14" height="12" rx="2" transform="rotate(45 -37 38)"/>
      <rect x="30"  y="32"  width="14" height="12" rx="2" transform="rotate(-45 37 38)"/>
    </g>
    <circle r="18" fill="#1A1A1A"/>
  </g>

  <!-- Cinnabar "G" mark -->
  <g fill="none" stroke="#E34234" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 92 44
             A 32 32 0 1 0 92 84
             L 70 84
             L 70 66
             L 92 66"/>
  </g>
</svg>
