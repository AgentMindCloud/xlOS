  Master 128x128 icon. Cinnabar Glass palette:
    - Background ink:    #0D0D0D
    - Cinnabar gradient: #C73E1D -> #E03C31
    - Inner highlight:   rgba(255,255,255,0.06)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="xlOS">
  <defs>
    <linearGradient id="xlosCinnabar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C73E1D"/>
      <stop offset="100%" stop-color="#E03C31"/>
    </linearGradient>
    <radialGradient id="xlosGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ED5C45" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ED5C45" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark ink rounded background -->
  <rect width="128" height="128" rx="22" ry="22" fill="#0D0D0D"/>
  <!-- Glass-like inner highlight -->
  <rect x="1" y="1" width="126" height="126" rx="21" ry="21" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Cinnabar glow -->
  <rect width="128" height="128" rx="22" ry="22" fill="url(#xlosGlow)"/>

  <!-- Stylized "x" mark in cinnabar gradient -->
  <g stroke="url(#xlosCinnabar)" stroke-width="14" stroke-linecap="round" fill="none">
    <line x1="40" y1="40" x2="88" y2="88"/>
    <line x1="88" y1="40" x2="40" y2="88"/>
  </g>
  <!-- Subtle inner highlight on the mark -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-linecap="round" fill="none">
    <line x1="42" y1="42" x2="86" y2="86"/>
    <line x1="86" y1="42" x2="42" y2="86"/>
  </g>
</svg>
