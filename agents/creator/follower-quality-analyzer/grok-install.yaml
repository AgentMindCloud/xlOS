# Vendored from grok-agent main; migrated v2.15 -> v2.14 + extensions.
version: '2.14'
name: follower-quality-analyzer
description: Aggregate follower-quality scoring for X creators — 4 standard metrics,
  paraphrased top-follower archetypes, bot-engagement paradox detection, and ≥3 cross-template
  bridges. Aggregate-only privacy
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - worker
category: creator-template
cost_limits:
  usd_per_session_max: 0.3
  usd_per_day_max: 1.0
  tokens_per_session_max: 60000
  api_calls_per_session_max: 80
tools:
- name: generate_follower_quality_analysis
  type: local_function
  description: Produce a 6-section structured follower-quality analysis (or 7-section
    when red-flag count > 3 OR sample size < 50) with 4 official aggregate metrics,
    paraphrased top-follower archetypes, bot-engagement paradox detection, and ≥3
    cross-template bridges. Never exposes individual follower PII.
  module: follower_quality_analyzer.run
  function: generate
extensions:
  constitution:
  - V.1
  xlos_runtime:
    type: python_module
    module: follower_quality_analyzer
