version: '2.14'
name: comment-engagement-booster
description: "Local-first comment engagement booster for X creators \u2014 turns a\
  \ single post into 3-5 comment variants tuned to a chosen boost angle (question\
  \ / controversy / story / poll / all) with 4 official Comment Plan Score metrics\
  \ (Hook strength / Conversation potential / Voice fidelity / Distinct angle), hook-without-substance\
  \ paradox detection, anti-spam refusal, and >= 3 cross-template bridges. Drafts\
  \ only \u2014 never auto-publishes."
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - action
  - ide
category: creator-template
tools:
- name: generate_comment_variants
  type: local_function
  module: comment_engagement_booster.run
  function: generate
  description: "Produce a 6-section structured comment-engagement plan (or 7-section\
    \ when red-flag count > 3 OR boost_focus='all') with 3-5 comment variants spanning\
    \ the chosen angle, 4-row Comment Plan Score table per variant, hook-without-substance\
    \ paradox detection, anti-spam refusal, and >= 3 cross-template bridges. Drafts\
    \ only \u2014 never auto-publishes."
  parameters:
    schema:
      type: object
      properties:
        x_handle:
          type: string
          description: Creator's X handle (with or without @). The voice anchor for
            comment generation.
        post_url_or_text:
          type: string
          description: Either an x.com / twitter.com URL pointing to the post being
            commented on, OR the literal post text. Required unless --demo is passed.
        boost_focus:
          type: string
          enum:
          - question
          - controversy
          - story
          - poll
          - all
          default: question
          description: Which angle the comment variants prioritise. 'all' lets the
            runner pick the most leverage-y angle for the supplied post.
        num_comments:
          type: integer
          minimum: 3
          maximum: 5
          default: 3
          description: Number of variant comments to emit (default 3, max 5).
      required:
      - x_handle
      - post_url_or_text
cost_limits:
  usd_per_session_max: 0.3
  usd_per_day_max: 1.0
  tokens_per_session_max: 60000
  api_calls_per_session_max: 80
extensions:
  constitution:
  - I
  - II
  - VI
  - VII
  constitution_v215:
    rules:
    - Drafts only. The runner emits comment text the creator reviews and ships. Constitution
      Article II's `publish_to_x` consent gate covers every variant.
    - "No mass-identical comments. The runner refuses to emit two variants that share\
      \ more than 60% token overlap \u2014 that pattern is comment spam, not engagement,\
      \ and X's policy review treats it as abuse."
    - "Surface the hook-without-substance paradox in BOTH the Comment Plan section\
      \ AND the Red Flags section whenever Hook strength > 70 AND Conversation potential\
      \ < 30 (the opener is gripping but the comment does not invite or sustain a\
      \ reply chain \u2014 bait without follow-through)."
    - No misrepresentation. When commenting on another creator's post, never put words
      in their mouth, never claim authorship of their idea, never frame the comment
      as if the creator agreed with a position they didn't take.
    - Every monetization-related comment recommendation (e.g. paid-tier funnel comment,
      sponsored-content comment) carries the Article V.1 'Not financial advice' banner
      verbatim.
    - Every analysis links to >= 3 cross-template bridges so the creator can wire
      the comment into the next loop without leaving Grok Agent OS.
    hard_refusals:
    - auto-publish a comment to X (or any platform) without an explicit consent gate
    - emit two variants that share more than 60% token overlap (comment spam)
    - recommend coordinated mass-engagement, report-brigading, or pile-on patterns
      against any post or creator
    - misrepresent the post being commented on (no fabricated quotes, no putting words
      in someone's mouth)
    - scrape authenticated X content to seed comment variants
  safety_v215:
    pii_handling: local-only
    data_retention_days: 90
    scanner_severity_floor: warn
    forbidden_actions:
    - scrape_authenticated_x_content
    - impersonate_user_identity
    - bypass_safety_scanner
    - exfiltrate_user_data
    cost_limits:
      usd_per_session_max: 0.3
      usd_per_day_max: 1.0
      tokens_per_session_max: 60000
      api_calls_per_session_max: 80
    human_in_the_loop:
      enabled: true
      confirm_before:
      - any export of the comment variants to a path outside the agent AppData folder
      - any future-version auto-publish (currently disabled in v1)
      timeout_seconds: 60
    disclaimers:
      not_financial_advice: true
      not_tax_advice: false
      real_world_action_consent: false
  windows_legacy:
    appdata_folder: grok-agent/comment-engagement-booster
    cache_folder: grok-agent/comment-engagement-booster/cache
    log_folder: grok-agent/comment-engagement-booster/logs
    min_powershell_version: '5.1'
    requires_admin: false
    chrome_only: true
  runtime_dispatch:
    type: python_module
    module: comment_engagement_booster
  original_kind: creator-template
