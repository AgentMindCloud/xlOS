# Vendored from grok-agent main; migrated v2.15 -> v2.14 + extensions.
version: '2.14'
name: competitor-watch
description: Aggregate competitor monitoring for X creators — 4 official Watch Score
  metrics (Audience overlap / Content velocity / Growth signal / Monetization activity),
  3-5 paraphrased competitor profile cards, 3-5 content gaps + 3-5 growth opportunities,
  cadence-fatigue paradox detection, and >= 3 cross-template bridges. Surfaces named
  competitors only when explicitly passed as input — never their followers, never
  their DMs, never their PII
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - worker
category: creator-template
cost_limits:
  usd_per_session_max: 0.3
  usd_per_day_max: 1.0
  tokens_per_session_max: 60000
  api_calls_per_session_max: 80
tools:
- name: generate_competitor_watch
  type: local_function
  description: Produce a 6-section structured competitor-watch report (or 7-section
    when red-flag count > 3 OR competitor handle count < 2) with 4 official Watch
    Score metrics per competitor, 3-5 paraphrased profile cards, 3-5 content gaps,
    3-5 growth opportunities, cadence-fatigue paradox detection, and >= 3 cross-template
    bridges. Names only the competitors the creator explicitly supplied — never their
    followers, never their DMs.
  module: competitor_watch.run
  function: generate
extensions:
  constitution:
  - V.1
  xlos_runtime:
    type: python_module
    module: competitor_watch
