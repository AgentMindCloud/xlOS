version: '2.14'
name: content-recycler
description: "Local-first content recycler for X creators \u2014 turns an old X post\
  \ into 2-3 recycled variants under a chosen angle (update / expand / threadify /\
  \ repurpose / auto) and target format (tweet / thread / carousel / newsletter /\
  \ all) with 4 official Recycle Score metrics (Freshness lift / Format fit / Engagement\
  \ potential / Differentiation), stale-rehash paradox detection, and >= 3 cross-template\
  \ bridges. Recycles only the creator's own content. Drafts only \u2014 never auto-publishes."
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - action
  - ide
category: creator-template
tools:
- name: generate_recycled_variants
  type: local_function
  module: content_recycler.run
  function: generate
  description: "Produce a 6-section structured content-recycle report (or 7-section\
    \ when red-flag count > 3 OR target_format='all') with 2-3 recycled variants tuned\
    \ to the chosen target format, 4-row Recycle Score table per variant, recycle-angle\
    \ explanation, engagement prediction, suggested visuals, stale-rehash paradox\
    \ detection, and >= 3 cross-template bridges. Drafts only \u2014 never auto-publishes\
    \ anywhere."
  parameters:
    schema:
      type: object
      properties:
        x_handle:
          type: string
          description: "Creator's X handle (with or without @). Must be the creator's\
            \ own \u2014 recycling another account's content is refused."
        old_post_url_or_text:
          type: string
          description: Either an x.com / twitter.com URL pointing to the source post,
            OR the literal post text. Required unless --demo is passed.
        recycle_angle:
          type: string
          enum:
          - update
          - expand
          - threadify
          - repurpose
          - auto
          default: auto
          description: 'How to refresh the source: update (new data/numbers), expand
            (add depth), threadify (single -> thread), repurpose (format-shift), auto
            (runner picks).'
        target_format:
          type: string
          enum:
          - tweet
          - thread
          - carousel
          - newsletter
          - all
          default: thread
          description: Where the recycled variants are aimed. 'all' generates one
            variant per format (4 total).
        original_post_date:
          type: string
          description: Optional ISO date (YYYY-MM-DD) of the original post; preserved
            verbatim in the attribution stamp on every variant. Defaults to '(date
            unknown)' when omitted.
      required:
      - x_handle
cost_limits:
  usd_per_session_max: 0.3
  usd_per_day_max: 1.0
  tokens_per_session_max: 60000
  api_calls_per_session_max: 80
extensions:
  constitution:
  - I
  - II
  - VI
  - VII
  constitution_v215:
    rules:
    - Drafts only. The runner never publishes a variant. Constitution Article II's
      `publish_to_x` consent gate covers every output.
    - "Recycle only the creator's own content. The runner refuses to adapt a post\
      \ the creator did not author \u2014 recycling another account's content is impersonation\
      \ by another name."
    - Preserve the 'originally posted on <date>' attribution stamp on every variant.
      The runner never strips it; the creator may strip it manually before posting.
    - "Surface the stale-rehash paradox in BOTH the variant card AND the Red Flags\
      \ section whenever Format fit > 70 AND Freshness lift < 35 (the variant is well-formatted\
      \ but adds no new value vs the original \u2014 that is a re-publish, not a recycle)."
    - Every monetization-related recommendation (cross-platform paid-tier funnel,
      sponsored-content recycle) carries the Article V.1 'Not financial advice' banner
      verbatim.
    - Every analysis links to >= 3 cross-template bridges so the creator can act on
      the findings without leaving Grok Agent OS.
    hard_refusals:
    - recycle a post the creator did not author (refuse on a handle mismatch)
    - auto-publish a variant to any platform without an explicit consent gate
    - strip the 'originally posted on <date>' attribution stamp from any variant
    - claim a recycled variant is original content
    - "fabricate updated data, statistics, or quotes the source did not contain \u2014\
      \ when angle=update and runner has no fresh data, mark the placeholder explicitly"
    - scrape authenticated X content to seed the recycle
  safety_v215:
    pii_handling: local-only
    data_retention_days: 90
    scanner_severity_floor: warn
    forbidden_actions:
    - scrape_authenticated_x_content
    - impersonate_user_identity
    - bypass_safety_scanner
    - exfiltrate_user_data
    cost_limits:
      usd_per_session_max: 0.3
      usd_per_day_max: 1.0
      tokens_per_session_max: 60000
      api_calls_per_session_max: 80
    human_in_the_loop:
      enabled: true
      confirm_before:
      - any export of the variant set to a path outside the agent AppData folder
      - any future-version auto-publish (currently disabled in v1)
      timeout_seconds: 60
    disclaimers:
      not_financial_advice: true
      not_tax_advice: false
      real_world_action_consent: false
  windows_legacy:
    appdata_folder: grok-agent/content-recycler
    cache_folder: grok-agent/content-recycler/cache
    log_folder: grok-agent/content-recycler/logs
    min_powershell_version: '5.1'
    requires_admin: false
    chrome_only: true
  runtime_dispatch:
    type: python_module
    module: content_recycler
  original_kind: creator-template
