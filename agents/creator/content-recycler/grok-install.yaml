# Vendored from grok-agent main; migrated v2.15 -> v2.14 + extensions.
version: '2.14'
name: content-recycler
description: Local-first content recycler for X creators — turns an old X post into
  2-3 recycled variants under a chosen angle (update / expand / threadify / repurpose
  / auto) and target format (tweet / thread / carousel / newsletter / all) with 4
  official Recycle Score metrics (Freshness lift / Format fit / Engagement potential
  / Differentiation), stale-rehash paradox detection, and >= 3 cross-template bridges.
  Recycles only the creator's own content. Drafts only — never auto-publishes
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - worker
category: creator-template
cost_limits:
  usd_per_session_max: 0.3
  usd_per_day_max: 1.0
  tokens_per_session_max: 60000
  api_calls_per_session_max: 80
tools:
- name: generate_recycled_variants
  type: local_function
  description: Produce a 6-section structured content-recycle report (or 7-section
    when red-flag count > 3 OR target_format='all') with 2-3 recycled variants tuned
    to the chosen target format, 4-row Recycle Score table per variant, recycle-angle
    explanation, engagement prediction, suggested visuals, stale-rehash paradox detection,
    and >= 3 cross-template bridges. Drafts only — never auto-publishes anywhere.
  module: content_recycler.run
  function: generate
extensions:
  constitution:
  - II
  - V.1
  xlos_runtime:
    type: python_module
    module: content_recycler
