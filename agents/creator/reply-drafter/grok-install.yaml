version: '2.14'
name: reply-drafter
description: "Local-first reply drafter for X creators \u2014 reads a parent X post\
  \ / thread (and optional voice samples + 7-day trend snapshot + analytics signals)\
  \ and emits a 6/7-section structured reply plan with 3-10 ready-to-post reply drafts\
  \ (default 5), 4 official Reply Plan Score metrics (Niche fit / Trend alignment\
  \ / Voice fidelity / Predicted engagement), vanity-hook paradox detection (Trend\
  \ alignment > 80 AND Niche fit < 50), 10 tone-matched archetypes shared with content-idea-generator,\
  \ content-enga..."
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - action
  - ide
category: creator-template
tools:
- name: generate_reply_drafts
  type: local_function
  module: reply_drafter.run
  function: generate
  description: "Produce a 6-section structured reply plan (or 7-section when red-flag\
    \ count > 3 OR count >= 8 OR vanity-hook paradox fires OR data_source='demo' with\
    \ no voice/trends) with 3-10 ready-to-post reply drafts (default 5), 4-row Reply\
    \ Plan Score table (Niche fit / Trend alignment / Voice fidelity / Predicted engagement)\
    \ with weighted score, 10 tone-matched archetype assignments, vanity-hook paradox\
    \ detection (Trend alignment > 80 AND Niche fit < 50), per-draft engagement prediction\
    \ bands (range only \u2014 never absolute counts), and >= 3 cross-template bridges\
    \ that always include analytics-summarizer and thread-builder. Drafts only \u2014\
    \ never auto-publishes; never generates monetization / sales / affiliate language\
    \ unless explicitly requested."
  parameters:
    schema:
      type: object
      properties:
        x_handle:
          type: string
          description: "Creator's X handle (with or without @). The voice anchor for\
            \ draft scoring; Voice fidelity is measured against this handle's supplied\
            \ samples \u2014 never another creator's posts."
        parent_post:
          type: string
          description: The text body of the parent X post / thread the creator is
            replying to. Required unless --demo is passed. Pasted as plain text; the
            runner does not fetch the post itself.
        parent_handle:
          type: string
          description: "Optional handle of the parent post's author (with or without\
            \ @). Used only as context in the snapshot \u2014 Voice fidelity is still\
            \ scored against --x-handle, never the parent."
        niche:
          type: string
          description: Creator's niche / topic anchor in plain text. Used to score
            Niche fit on each draft so trend-chasing replies that don't fit the niche
            are flagged via the vanity-hook paradox rule.
        tone:
          type: string
          enum:
          - punchy
          - thoughtful
          - data-led
          - mixed
          default: punchy
          description: Tone register to emphasise across the drafts. Same 4-tone vocabulary
            as content-idea-generator so the daily ideation loop and the reply loop
            pull from the same pool.
        count:
          type: integer
          minimum: 3
          maximum: 10
          default: 5
          description: Number of reply drafts to generate (3-10). Default 5. Counts
            >= 8 auto-trigger the optional Reply Audit because cognitive load on the
            creator rises sharply.
        voice_samples:
          type: array
          items:
            type: string
          description: Optional inline list of recent post bodies authored by --x-handle.
            Used to anchor Voice fidelity scoring; the runner refuses to train on
            another creator's posts.
        trends:
          type: array
          items:
            type: string
          description: Optional list of last-7d niche trend phrases (strings). When
            supplied, Trend alignment is anchored to the actual surface rather than
            archetype defaults.
        analytics_file:
          type: string
          description: Optional path to an analytics-summarizer JSON export. When
            provided, Predicted engagement is anchored to the creator's actual baseline
            rather than a niche-typical default.
        allow_monetization:
          type: boolean
          default: false
          description: Default false. When false, any reply that contains revenue
            / paid-tier / sponsorship / affiliate language is refused and the run
            is routed at monetization-optimizer. Set true ONLY when the creator has
            explicitly requested a monetization-shaped reply (e.g. announcing a paid
            drop).
      required:
      - x_handle
cost_limits:
  usd_per_session_max: 0.3
  usd_per_day_max: 1.0
  tokens_per_session_max: 60000
  api_calls_per_session_max: 80
extensions:
  constitution:
  - I
  - II
  - VI
  - VII
  constitution_v215:
    rules:
    - Drafts only. The runner emits reply variants the creator pastes into their X
      composer themselves; the runner never auto-publishes, never schedules, never
      DMs the draft to anyone. v1 has real_time_x.enabled = false; any future v2 posting
      capability requires an explicit publish_to_x consent gate per draft.
    - Train Voice fidelity scoring only on the creator's own posts. The runner refuses
      to score voice against samples authored by a different handle (including the
      parent post's author). The system prompt is unambiguous; the runner's contract
      is unambiguous; the manifest binds the unambiguous contract.
    - No fabricated engagement absolutes. Predicted engagement is a 0-100 sub-score
      plus a band label (low / medium / high). The runner refuses to print absolute
      like / repost / reply counts it cannot derive from a creator-supplied analytics
      file.
    - "Surface the vanity-hook paradox in BOTH the Reply Plan Performance section\
      \ AND the Red Flags section whenever any draft has Trend alignment > 80 AND\
      \ Niche fit < 50 \u2014 a reply that rides the parent post's trending surface\
      \ for the wrong audience is the most common Type-I error in creator engagement\
      \ (carry-over from content-idea-generator P98)."
    - "Every reply draft is paraphrased to the creator's voice \u2014 never copy-pasted\
      \ from competitors and never a sycophantic echo of the parent post. The runner\
      \ refuses to suggest copying a competitor's signature phrasing or simply restating\
      \ the parent's argument."
    - "Every analysis links to >= 3 cross-template bridges so the creator can wire\
      \ the reply into the next loop without leaving Grok Agent OS \u2014 bridges\
      \ MUST include `analytics-summarizer` (so the post-reply read is structured)\
      \ and `thread-builder` (so a high-EV reply can be promoted into a long-form\
      \ anchor when the topic carries one)."
    - '10 tone-matched archetypes shared with content-idea-generator. Every draft
      is tagged with one archetype from the official set: numbers-led-list, contrarian-thesis,
      first-person-rebuild, question-led-poll, tactical-playbook, story-cold-open,
      metric-receipt, synthesis-takedown, trend-aligned-riff, anti-pattern-warning.
      The runner picks the per-tone subset deterministically so the same input always
      yields the same reply set.'
    - "No monetization / sales / affiliate language by default. When `allow_monetization`\
      \ is false (the default) the runner refuses to generate any reply that contains\
      \ revenue, paid-tier, sponsorship, ad-spend, affiliate, or cashtag scope \u2014\
      \ it emits a structured refusal that points the creator at `monetization-optimizer`\
      \ and stops. The user must explicitly set `allow_monetization: true` to opt\
      \ in, and even then no financial advice is generated \u2014 only on-brand reply\
      \ structure."
    - Audit auto-triggers when red-flag count > 3 OR count >= 8 OR the vanity-hook
      paradox fires OR data_source = demo with no voice samples and no trends file.
      Identical condition set to content-idea-generator P98 so the audit semantics
      are consistent across the daily creator loop.
    - "Reply character cap of 280 (X's default reply-body cap). Every draft body is\
      \ enforced <= 280 characters at render time. Threaded multi-post replies are\
      \ out of scope for v1 \u2014 that work belongs to `thread-builder`."
    - "Engagement prediction bands are content-engagement only (impressions / replies\
      \ / reposts / bookmarks pattern). The runner does NOT predict revenue, paid-tier\
      \ conversions, or sponsorship dollars \u2014 that is `monetization-optimizer`'s\
      \ job and explicitly out of scope here."
    - "Count cap. The runner never emits more than 10 drafts regardless of input \u2014\
      \ and >= 8 auto-triggers the Reply Audit because cognitive load on the creator\
      \ rises sharply."
    hard_refusals:
    - "auto-publish, auto-schedule, or auto-DM any reply draft to any platform without\
      \ an explicit consent gate (v1 has no posting capability \u2014 all drafts are\
      \ read-only)"
    - fabricate absolute engagement counts (likes / reposts / replies / bookmarks)
      on any draft
    - score Voice fidelity against samples authored by a creator other than --x-handle
      (including the parent post's author)
    - copy-paste a competitor's signature phrasing, sycophantically echo the parent
      post, or impersonate the parent author's voice
    - emit more than 10 reply drafts in a single run
    - "generate any monetization / sales / sponsorship / affiliate / cashtag reply\
      \ when allow_monetization is false (the default) \u2014 emit a structured refusal\
      \ pointing at monetization-optimizer instead"
    - "scrape authenticated X content to seed the parent post or the voice samples\
      \ \u2014 the parent post text must be pasted by the creator"
    - "predict revenue, paid-tier conversions, or sponsorship dollars (out of scope\
      \ \u2014 see monetization-optimizer)"
  safety_v215:
    pii_handling: local-only
    data_retention_days: 90
    scanner_severity_floor: warn
    forbidden_actions:
    - scrape_authenticated_x_content
    - impersonate_user_identity
    - bypass_safety_scanner
    - exfiltrate_user_data
    - copy_competitor_signature_phrasing
    - auto_publish_without_consent
    cost_limits:
      usd_per_session_max: 0.3
      usd_per_day_max: 1.0
      tokens_per_session_max: 60000
      api_calls_per_session_max: 80
    human_in_the_loop:
      enabled: true
      confirm_before:
      - any export of the reply plan to a path outside the agent AppData folder
      - any future-version auto-publish (currently disabled in v1)
      - any draft generated with allow_monetization=true (must be confirmed before
        render)
      timeout_seconds: 60
    disclaimers:
      not_financial_advice: false
      not_tax_advice: false
      real_world_action_consent: true
  real_time_x:
    enabled: false
    consent_required: true
    triggers:
    - mention
    posts: false
    reply_only: true
    max_posts_per_day: 30
    notes: "v1 is drafts-only \u2014 real_time_x.enabled is false. Future v2 may enable\
      \ consented reply posting; every action will require an explicit publish_to_x\
      \ consent gate. The runner never auto-sends in v1."
  windows_legacy:
    appdata_folder: grok-agent/reply-drafter
    cache_folder: grok-agent/reply-drafter/cache
    log_folder: grok-agent/reply-drafter/logs
    min_powershell_version: '5.1'
    requires_admin: false
    chrome_only: true
  runtime_dispatch:
    type: python_module
    module: reply_drafter
  original_kind: creator-template
