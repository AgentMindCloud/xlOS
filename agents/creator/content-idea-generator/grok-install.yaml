# Vendored from grok-agent main; migrated v2.15 -> v2.14 + extensions.
version: '2.14'
name: content-idea-generator
description: Local-first content idea generator for X creators — reads creator-supplied
  performance + voice signals (or seeded demo signals) and emits a 7/8-section structured
  idea batch with 4 official Idea Plan Score metrics (Niche fit / Trend alignment
  / Voice fidelity / Predicted engagement), derivative-and-thin paradox detection
  in BOTH the Plan Score AND Red Flags sections (avg Originality < 40 AND avg Voice
  fidelity < 60), 4-6 idea cards across single / thread / quote-tweet / image-post
  / reply-thr...
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - web
category: creator-template
cost_limits:
  usd_per_session_max: 0.15
  api_calls_per_session_max: 50
tools:
- name: generate_post_idea_batch
  type: local_function
  description: Generate N X post ideas given the user's niche and a 7-day trend snapshot.
  module: content_idea_generator.run
  function: generate
extensions:
  xlos_runtime:
    type: python_module
    module: content_idea_generator
