version: '2.14'
name: hashtag-strategy-advisor
description: "Local-first hashtag strategy advisor for X creators \u2014 turns a post\
  \ topic into a 6/7-section strategy with 5-10 hashtags scored across 4 standard\
  \ metrics (Niche relevance / Reach potential / Engagement quality / Cleanliness),\
  \ spread across the 5-category mix (broad-niche / specific-niche / trending / community\
  \ / branded), with reach-without-relevance paradox detection, anti-engagement-bait\
  \ refusal, platform-specific count caps (X 0-2 / LinkedIn 0-3), and >= 3 cross-template\
  \ bridges. Drafts onl..."
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - action
  - ide
category: creator-template
tools:
- name: generate_hashtag_strategy
  type: local_function
  module: hashtag_strategy_advisor.run
  function: generate
  description: "Produce a 6-section structured hashtag strategy (or 7-section when\
    \ red-flag count > 3 OR platform='all') with 5-10 scored hashtag recommendations\
    \ across the 5-category mix, 4-row Hashtag Plan Score table, platform-specific\
    \ count caps (X 0-2 / LinkedIn 0-3), reach-without-relevance paradox detection,\
    \ anti-engagement-bait refusal, and >= 3 cross-template bridges. Drafts only \u2014\
    \ never auto-publishes."
  parameters:
    schema:
      type: object
      properties:
        x_handle:
          type: string
          description: Creator's X handle (with or without @). The voice anchor for
            branded hashtags.
        post_topic_or_text:
          type: string
          description: Either an x.com / twitter.com URL pointing to the post, OR
            the literal post topic / text. Required unless --demo is passed.
        platform:
          type: string
          enum:
          - x
          - linkedin
          - all
          default: x
          description: "Target platform \u2014 drives the recommended count cap (X\
            \ 0-2, LinkedIn 0-3). 'all' emits both with explicit per-platform caps."
        num_hashtags:
          type: integer
          minimum: 5
          maximum: 10
          default: 5
          description: Number of hashtags to score and recommend (the runner returns
            the full ranked set; the creator picks 0-2 / 0-3 to actually ship per
            platform cap).
        focus:
          type: string
          enum:
          - reach
          - engagement
          - niche
          - all
          default: all
          description: Which standard metric to emphasise in the headline + ranking.
            'all' applies no nudge.
      required:
      - x_handle
      - post_topic_or_text
cost_limits:
  usd_per_session_max: 0.3
  usd_per_day_max: 1.0
  tokens_per_session_max: 60000
  api_calls_per_session_max: 80
extensions:
  constitution:
  - I
  - II
  - VI
  - VII
  constitution_v215:
    rules:
    - Drafts only. The runner emits hashtag recommendations the creator pastes into
      their own post copy. The runner never auto-publishes.
    - No engagement-bait hashtags. The runner refuses to recommend `#FollowForFollow`,
      `#Like4Like`, `#FF`, `#TeamFollowBack`, mass-trending-misuse tags, or any pattern
      an X policy review would treat as algorithm gaming.
    - "Surface the reach-without-relevance paradox in BOTH the Hashtag Plan section\
      \ AND the Red Flags section whenever Reach potential > 70 AND Niche relevance\
      \ < 35 (the hashtag has audience but it's the wrong audience \u2014 drive-bys,\
      \ not the creator's people)."
    - Platform-specific count caps. Recommend up to `num_hashtags` for analysis, but
      explicitly state the SHIP cap (X = 0-2 hashtags per post, LinkedIn = 0-3 per
      post). Over-stuffing the post is its own anti-pattern.
    - "No misleading category claims. Every recommended hashtag is tagged with one\
      \ of the 5 official categories (broad-niche / specific-niche / trending / community\
      \ / branded) and the tag is honest \u2014 a hashtag is only `trending` if it\
      \ has documented current velocity, not because the creator wishes it were."
    - Every monetization-related hashtag recommendation (paid-tier launch, sponsored
      content, creator-fund-style hashtags) carries the Article V.1 'Not financial
      advice' banner verbatim.
    - Every analysis links to >= 3 cross-template bridges so the creator can wire
      the strategy into the next loop without leaving Grok Agent OS.
    hard_refusals:
    - auto-publish a post with hashtags to any platform without an explicit consent
      gate
    - recommend any engagement-bait hashtag (FollowForFollow / Like4Like / FF / TeamFollowBack
      family)
    - recommend a hashtag the post does not honestly relate to (algorithm-manipulation
      / trending-misuse pattern)
    - recommend more hashtags than the platform cap allows the creator to ship (X
      = 2 max, LinkedIn = 3 max)
    - scrape authenticated X content to seed the recommendations
  safety_v215:
    pii_handling: local-only
    data_retention_days: 90
    scanner_severity_floor: warn
    forbidden_actions:
    - scrape_authenticated_x_content
    - impersonate_user_identity
    - bypass_safety_scanner
    - exfiltrate_user_data
    cost_limits:
      usd_per_session_max: 0.3
      usd_per_day_max: 1.0
      tokens_per_session_max: 60000
      api_calls_per_session_max: 80
    human_in_the_loop:
      enabled: true
      confirm_before:
      - any export of the hashtag strategy to a path outside the agent AppData folder
      - any future-version auto-publish (currently disabled in v1)
      timeout_seconds: 60
    disclaimers:
      not_financial_advice: true
      not_tax_advice: false
      real_world_action_consent: false
  windows_legacy:
    appdata_folder: grok-agent/hashtag-strategy-advisor
    cache_folder: grok-agent/hashtag-strategy-advisor/cache
    log_folder: grok-agent/hashtag-strategy-advisor/logs
    min_powershell_version: '5.1'
    requires_admin: false
    chrome_only: true
  runtime_dispatch:
    type: python_module
    module: hashtag_strategy_advisor
  original_kind: creator-template
