# Migrated from AgentMindCloud/grok-agent (v2.15 draft) to v2.14 + extensions.
# See docs/migration/v215-to-v214-extensions.md for the field mapping.
version: '2.14'
name: cross-platform-reposter
description: Local-first cross-platform repost helper for X creators — turns a single
  X post into 2-3 variants per target platform (LinkedIn / Threads / Bluesky / Newsletter)
  with 4 official Variant Score metrics (Voice fidelity / Platform fit / Engagement
  potential / Attribution clarity), platform adaptations, voice-drift paradox detection,
  and >= 3 cross-template bridges. Drafts only — never auto-publishes.
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - ide
category: creator-template
tools:
- name: generate_cross_platform_variants
cost_limits: &id001
  usd_per_session_max: 0.3
  usd_per_day_max: 1.0
  tokens_per_session_max: 60000
  api_calls_per_session_max: 80
extensions:
  constitution:
    articles:
    - II
    - V.1
    rules:
    - Drafts only. The runner never publishes a variant to any platform. Every output
      is text the creator reviews and ships themselves (Constitution Article II —
      consent gate covers `publish_to_x` AND any sibling platform).
    - Preserve attribution. Every variant includes — at minimum — a one-line attribution
      footer pointing to the original X post (handle + post date or URL when supplied).
      The creator may strip it before posting; the runner never strips it.
    - Surface the voice-drift paradox in BOTH the variant card AND the Red Flags section
      whenever Platform fit > 70 AND Voice fidelity < 40 (the variant is platform-optimized
      at the cost of the creator's voice — that pattern erodes brand consistency over
      time).
    - Every monetization-related recommendation (e.g. cross-platform paid-tier funnel,
      sponsored-content adaptation) carries the Article V.1 'Not financial advice'
      banner verbatim.
    - Refuse to generate variants designed to mislead about the source (no platform-specific
      exclusivity claims when the post is also live on X). Refuse to clone another
      creator's voice — the only voice the runner adapts is the creator's own.
    - Every analysis links to >= 3 cross-template bridges so the creator can act on
      the findings without leaving Grok Agent OS.
    hard_refusals:
    - auto-publish a variant to any platform without an explicit consent gate
    - strip the attribution footer from any variant
    - claim platform-exclusivity for content that is also live on X
    - clone another creator's voice or branding
    - scrape authenticated content of any platform to seed the variant
  x_money_specific:
    disclaimers:
      not_financial_advice: true
      not_tax_advice: false
    cost_limits: *id001
  safety_policy:
    pii_handling: local-only
    data_retention_days: 90
    scanner_severity_floor: warn
    forbidden_actions:
    - scrape_authenticated_x_content
    - impersonate_user_identity
    - bypass_safety_scanner
    - exfiltrate_user_data
    human_in_the_loop:
      enabled: true
      confirm_before:
      - any export of the variant set to a path outside the agent AppData folder
      - any future-version auto-publish (currently disabled in v1)
      timeout_seconds: 60
  runtime_dispatch:
    type: python_module
    module: cross_platform_reposter.run
    note: xlos run dispatches via python -m <module>.
  metadata:
    display_name: Cross-Platform Reposter
    tagline: One X post, four platforms, zero voice drift.
    categories:
    - creator
    - distribution
    - content
    tags:
    - creator-template
    - cli-only
    - drafts-only
    - no-autopublish
  migration:
    source_repo: AgentMindCloud/grok-agent
    source_path: templates/creator/cross-platform-reposter/grok-agent.yaml
    source_version: '2.15'
    migrated_at: '2026-05-11'
    tooling: xlOS Phase 3b migrator
