version: '2.14'
name: cross-platform-reposter
description: "Local-first cross-platform repost helper for X creators \u2014 turns\
  \ a single X post into 2-3 variants per target platform (LinkedIn / Threads / Bluesky\
  \ / Newsletter) with 4 official Variant Score metrics (Voice fidelity / Platform\
  \ fit / Engagement potential / Attribution clarity), platform adaptations, voice-drift\
  \ paradox detection, and >= 3 cross-template bridges. Drafts only \u2014 never auto-publishes."
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - action
  - ide
category: creator-template
tools:
- name: generate_cross_platform_variants
  type: local_function
  module: cross_platform_reposter.run
  function: generate
  description: "Produce a 6-section structured cross-platform repost report (or 7-section\
    \ when red-flag count > 3 OR target_platforms count > 3) with 2-3 variants per\
    \ requested platform, 4-row Variant Score table per variant, platform-specific\
    \ adaptation notes, engagement tips, voice-drift paradox detection, and >= 3 cross-template\
    \ bridges. Drafts only \u2014 never auto-publishes anywhere."
  parameters:
    schema:
      type: object
      properties:
        x_handle:
          type: string
          description: Creator's X handle (with or without @). Used as the voice anchor
            + attribution source.
        post_url_or_text:
          type: string
          description: Either an x.com / twitter.com URL pointing to the source post,
            OR the literal post text. Required unless --demo is passed.
        target_platforms:
          type: array
          items:
            type: string
            enum:
            - linkedin
            - threads
            - bluesky
            - newsletter
            - all
          default:
          - all
          description: Which platforms to generate variants for. 'all' expands to
            linkedin + threads + bluesky + newsletter.
        tone:
          type: string
          enum:
          - match-source
          - professional
          - casual
          - thoughtful
          - punchy
          default: match-source
          description: Optional tone override. Default 'match-source' preserves the
            X post's voice.
        include_visual:
          type: boolean
          default: false
          description: Whether each variant includes a 1-line visual / image / chart
            suggestion appropriate to the target platform.
      required:
      - x_handle
cost_limits:
  usd_per_session_max: 0.3
  usd_per_day_max: 1.0
  tokens_per_session_max: 60000
  api_calls_per_session_max: 80
extensions:
  constitution:
  - I
  - II
  - VI
  - VII
  constitution_v215:
    rules:
    - "Drafts only. The runner never publishes a variant to any platform. Every output\
      \ is text the creator reviews and ships themselves (Constitution Article II\
      \ \u2014 consent gate covers `publish_to_x` AND any sibling platform)."
    - "Preserve attribution. Every variant includes \u2014 at minimum \u2014 a one-line\
      \ attribution footer pointing to the original X post (handle + post date or\
      \ URL when supplied). The creator may strip it before posting; the runner never\
      \ strips it."
    - "Surface the voice-drift paradox in BOTH the variant card AND the Red Flags\
      \ section whenever Platform fit > 70 AND Voice fidelity < 40 (the variant is\
      \ platform-optimized at the cost of the creator's voice \u2014 that pattern\
      \ erodes brand consistency over time)."
    - Every monetization-related recommendation (e.g. cross-platform paid-tier funnel,
      sponsored-content adaptation) carries the Article V.1 'Not financial advice'
      banner verbatim.
    - "Refuse to generate variants designed to mislead about the source (no platform-specific\
      \ exclusivity claims when the post is also live on X). Refuse to clone another\
      \ creator's voice \u2014 the only voice the runner adapts is the creator's own."
    - Every analysis links to >= 3 cross-template bridges so the creator can act on
      the findings without leaving Grok Agent OS.
    hard_refusals:
    - auto-publish a variant to any platform without an explicit consent gate
    - strip the attribution footer from any variant
    - claim platform-exclusivity for content that is also live on X
    - clone another creator's voice or branding
    - scrape authenticated content of any platform to seed the variant
  safety_v215:
    pii_handling: local-only
    data_retention_days: 90
    scanner_severity_floor: warn
    forbidden_actions:
    - scrape_authenticated_x_content
    - impersonate_user_identity
    - bypass_safety_scanner
    - exfiltrate_user_data
    cost_limits:
      usd_per_session_max: 0.3
      usd_per_day_max: 1.0
      tokens_per_session_max: 60000
      api_calls_per_session_max: 80
    human_in_the_loop:
      enabled: true
      confirm_before:
      - any export of the variant set to a path outside the agent AppData folder
      - any future-version auto-publish (currently disabled in v1)
      timeout_seconds: 60
    disclaimers:
      not_financial_advice: true
      not_tax_advice: false
      real_world_action_consent: false
  windows_legacy:
    appdata_folder: grok-agent/cross-platform-reposter
    cache_folder: grok-agent/cross-platform-reposter/cache
    log_folder: grok-agent/cross-platform-reposter/logs
    min_powershell_version: '5.1'
    requires_admin: false
    chrome_only: true
  runtime_dispatch:
    type: python_module
    module: cross_platform_reposter
  original_kind: creator-template
