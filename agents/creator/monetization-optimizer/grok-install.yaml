version: '2.14'
name: monetization-optimizer
description: "Local-first monetization optimizer for X creators \u2014 reads a creator's\
  \ X performance + revenue signals (or seeded demo signals) and emits a 7/8-section\
  \ structured monetization plan with 4 official Monetization Plan Score metrics on\
  \ a 0-100 scale (Forecast Confidence / Diversification Score / Sponsor Fit Density\
  \ / Tax Readiness), weighted Performance score (0.30\xB7Diversification + 0.25\xB7\
  TaxReadiness + 0.25\xB7ForecastConfidence + 0.20\xB7SponsorFitDensity), the Concentration-Confidence\
  \ paradox (top cha..."
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - action
  - ide
category: creator-template
tools:
- name: generate_monetization_plan
  type: local_function
  module: monetization_optimizer.run
  function: generate
  description: "Produce a 7-section structured monetization plan (or 8-section Plan\
    \ Audit when ANY of: Concentration-Confidence paradox firing / count >= 8 / revenue_file\
    \ unset (data_source='demo') / jurisdiction unset OR not 'US' / projection_horizon='365d')\
    \ with 4-row Monetization Plan Score table on a 0-100 scale (Forecast Confidence\
    \ / Diversification Score / Sponsor Fit Density / Tax Readiness), weighted Performance\
    \ score (0.30\xB7Diversification + 0.25\xB7TaxReadiness + 0.25\xB7ForecastConfidence\
    \ + 0.20\xB7SponsorFitDensity), prioritized recommendations across the 5-channel\
    \ mix (paid_tier / creator_fund / sponsorships / digital_products / affiliate),\
    \ sponsorship fit analysis (paraphrased archetypes \u2014 never specific brand\
    \ names), tax/expense reserve notes with strong jurisdiction caveats (Article\
    \ V.2 verbatim with Vietnam-resident-creator addendum), the Concentration-Confidence\
    \ paradox surfaced in BOTH Plan Performance AND Red Flags when top_channel_share\
    \ >= 60% AND Forecast Confidence > 70/100, mandatory cross-template bridges to\
    \ analytics-summarizer + content-idea-generator (plus 1+ rotating bridge for a\
    \ minimum of 3 bridges total), and a structured diagnostic-mode refusal stub when\
    \ allow_monetization=false (the default). Drafts only \u2014 never auto-publishes;\
    \ never fabricates dollar amounts; never gives financial or tax advice. When allow_monetization=true\
    \ every monetization-touching line carries the Article V.1 banner verbatim."
  parameters:
    schema:
      type: object
      properties:
        x_handle:
          type: string
          description: Creator's X handle (with or without @). The voice anchor for
            sponsorship-archetype paraphrasing.
        revenue_file:
          type: string
          description: "Optional path to a creator-supplied revenue ledger (JSON or\
            \ CSV \u2014 typically exported from x-money-companion-dashboard's SQLite).\
            \ Schema: rows of {channel, period, gross, currency} where channel is\
            \ one of 'paid_tier' | 'creator_fund' | 'sponsorships' | 'digital_products'\
            \ | 'affiliate' | 'other'. When omitted, the runner emits seeded demo\
            \ signals explicitly labelled `[demo signal \u2014 re-run with --revenue-file\
            \ for real-ledger forecast]` and auto-triggers the Plan Audit."
        analytics_file:
          type: string
          description: Optional path to a creator-supplied analytics export (the same
            JSON the analytics-summarizer template consumes). When supplied, drives
            the Period Performance signals that feed the Forecast Confidence sub-score.
        projection_horizon:
          type: string
          enum:
          - 30d
          - 90d
          - 365d
          default: 90d
          description: Forecast horizon. 30d is short-cycle (sponsorship pipeline
            visibility); 90d is the default planning window; 365d auto-triggers the
            Plan Audit because the cone of uncertainty is large.
        channel_focus:
          type: string
          enum:
          - paid_tier
          - creator_fund
          - sponsorships
          - digital_products
          - affiliate
          - all
          default: all
          description: Which monetization channel to emphasise in the headline + recommendation
            ranking. 'all' applies no nudge.
        jurisdiction:
          type: string
          description: "Optional ISO country code (e.g. 'VN', 'US', 'SG') used to\
            \ caveat the Tax & Expense Notes section. The notes always carry the Article\
            \ V.2 'Not tax advice' banner regardless. Default unset \u2192 jurisdiction-agnostic\
            \ guidance + Plan Audit auto-triggered. The Vietnam-resident-creator addendum\
            \ is a named special-case inside the audit body, not the trigger itself."
        concentration_threshold:
          type: number
          minimum: 0.4
          maximum: 0.9
          default: 0.6
          description: Top-channel share above which the Concentration-Confidence
            paradox becomes eligible to trigger. Default 0.6 = 60%. Lower values produce
            more conservative concentration warnings.
        count:
          type: integer
          minimum: 3
          maximum: 10
          default: 5
          description: Number of prioritized recommendation rows to surface. Clamps
            to [3, 10]; default 5. count >= 8 auto-triggers the Plan Audit section
            because a deep recommendation read benefits from explicit caveating.
        allow_monetization:
          type: boolean
          default: false
          description: "Diagnostic-mode default is false. When false, the runner emits\
            \ a structured refusal stub for forward-looking monetization output (Earnings\
            \ Forecast section + Sponsorship Pricing recommendations + any $ figures\
            \ suppressed) \u2014 diagnostic mode still ships the Plan Snapshot, Plan\
            \ Performance metrics, current channel-mix table, Tax Readiness assessment,\
            \ Red Flags, Confidence, Plan Audit, and bridges so the creator can audit\
            \ foundations first. When true, the full plan is emitted and every monetization-touching\
            \ line carries the Article V.1 'Not financial advice' banner verbatim."
      required:
      - x_handle
cost_limits:
  usd_per_session_max: 0.3
  usd_per_day_max: 1.0
  tokens_per_session_max: 60000
  api_calls_per_session_max: 80
extensions:
  constitution:
  - I
  - II
  - VI
  - VII
  constitution_v215:
    rules:
    - Drafts only. The runner emits a plan the creator reads, edits, and acts on themselves;
      the runner never auto-publishes, never auto-applies, never auto-files, never
      auto-pitches a sponsor.
    - "No fabricated dollar amounts. The runner refuses to print absolute revenue\
      \ projections it did not derive from the supplied --revenue-file. Demo seeds\
      \ are reported as wide range bands explicitly labelled `[demo signal \u2014\
      \ re-run with --revenue-file for real-ledger forecast]`. Forecasts are always\
      \ reported as wide bands, never point estimates."
    - "Surface the Concentration-Confidence paradox in BOTH the Plan Performance section\
      \ AND the Red Flags section whenever the top channel's revenue share exceeds\
      \ the configured `concentration_threshold` (default 0.6 = 60%) AND the Forecast\
      \ Confidence sub-score is above 70/100. A confident forecast resting on one\
      \ fragile channel is reach-without-resilience \u2014 when the channel changes\
      \ its policy, the forecast collapses."
    - Every Earnings Forecast section (when emitted under allow_monetization=true)
      carries the Article V.1 'Not financial advice' banner verbatim. Every Tax &
      Expense Notes section carries the Article V.2 'Not tax advice' banner verbatim
      with the Vietnam-resident-creator addendum, since many of the Grok Agent OS
      users are exactly that demographic.
    - "Every monetization recommendation that derives a tactic from the analytics\
      \ or revenue file ALSO carries the Article V.1 disclaimer at the recommendation\
      \ level \u2014 not just at the Earnings Forecast section level."
    - "Sponsorship-fit recommendations name paraphrased sponsor archetypes (e.g. `dev-tools\
      \ company with technical-founder audience`) \u2014 never specific brand names\
      \ the creator did not supply themselves. The runner refuses to suggest specific\
      \ sponsors without explicit creator-supplied input."
    - "When `revenue_file` is omitted, the runner emits seeded demo signals with an\
      \ explicit `[demo signal \u2014 re-run with --revenue-file for real-ledger forecast]`\
      \ label so the creator never confuses the demo plan for their actual monetization\
      \ roadmap."
    - "Mandatory bridges to `analytics-summarizer` and `content-idea-generator` in\
      \ every Recommendations list \u2014 these are the official 'measure \u2192 plan\
      \ \u2192 next anchor' loop closers and never get omitted. Plus 1+ rotating bridge\
      \ from the 10-bridge set for a minimum of 3 bridges total."
    - Forecasts + Sponsorship Pricing are gated by `allow_monetization`. When false
      (diagnostic-mode default) the runner emits an action-oriented refusal stub guiding
      the creator to review the diagnostic foundations first, then re-run with `--allow-monetization`.
      When true, every monetization-touching line carries the Article V.1 banner verbatim.
    - "Insight prose is capped at 280 characters per line; longer narrative is truncated\
      \ to the cap with a `\u2026[capped]` marker so the creator can paste cleanly\
      \ into a brief, a Notion doc, or an X draft."
    hard_refusals:
    - auto-publish, auto-apply, auto-pitch, or auto-file any element of the monetization
      plan to any platform without an explicit consent gate
    - "fabricate absolute dollar revenue projections the creator's input does not\
      \ support \u2014 projections are always reported as wide bands, never point\
      \ estimates"
    - "give jurisdiction-specific tax filing advice (the Tax & Expense Notes are documentation\
      \ guidance only \u2014 the creator must consult a licensed tax professional)"
    - recommend specific sponsor brand names the creator did not supply (paraphrased
      archetypes only)
    - recommend monetization tactics that would erode audience trust (clickbait paid-tier
      hooks, misleading affiliate disclosure, over-saturated sponsorship cadence)
    - scrape authenticated X content or the creator's payment-processor account to
      seed the ledger
    - expose another creator's revenue ledger or paste a non-creator's data as if
      it belonged to --x-handle
    - emit Earnings Forecast or Sponsorship Pricing recommendations when allow_monetization=false;
      emit them without the Article V.1 banner when true
    - omit the mandatory bridges to analytics-summarizer or content-idea-generator
      from any Recommendations list
  safety_v215:
    pii_handling: local-only
    data_retention_days: 90
    scanner_severity_floor: warn
    forbidden_actions:
    - scrape_authenticated_x_content
    - scrape_payment_processor_account
    - impersonate_user_identity
    - bypass_safety_scanner
    - exfiltrate_user_data
    - emit_specific_sponsor_brand_names
    cost_limits:
      usd_per_session_max: 0.3
      usd_per_day_max: 1.0
      tokens_per_session_max: 60000
      api_calls_per_session_max: 80
    human_in_the_loop:
      enabled: true
      confirm_before:
      - any export of the monetization plan to a path outside the agent AppData folder
      - any future-version auto-pitch (currently disabled in v1)
      - any future-version auto-publish (currently disabled in v1)
      timeout_seconds: 60
    disclaimers:
      not_financial_advice: true
      not_tax_advice: true
      real_world_action_consent: false
  real_time_x:
    enabled: false
    consent_required: true
    posts: false
    reply_only: false
    max_posts_per_day: 0
  windows_legacy:
    appdata_folder: grok-agent/monetization-optimizer
    cache_folder: grok-agent/monetization-optimizer/cache
    log_folder: grok-agent/monetization-optimizer/logs
    min_powershell_version: '5.1'
    requires_admin: false
    chrome_only: true
  runtime_dispatch:
    type: python_module
    module: monetization_optimizer
  original_kind: creator-template
