version: '2.14'
name: mention-summarizer
description: "Local-first mention summarizer for X creators \u2014 reads creator-supplied\
  \ X mention data (or seeded demo mentions) and emits a 7/8-section structured summary\
  \ with 4 official Mention Health metrics (Mention volume delta / Net sentiment score\
  \ / Priority reply rate / Authentic reach share), sentiment-spike paradox detection\
  \ in both Mention Health and Red Flags sections, 3-band sentiment breakdown, priority\
  \ reply queue (max 8) with troll-cluster guard (\u22655 negative + >60% token overlap\
  \ \u2192 Red Flag), a..."
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - action
  - ide
category: creator-template
tools:
- name: generate_mention_summary
  type: local_function
  module: mention_summarizer.run
  function: generate
  description: "Produce a 7-section structured mention summary (or 8-section when\
    \ troll-cluster detected OR window=7d) with 4 official Mention Health metrics,\
    \ weighted Mention Health score, sentiment-spike paradox detection in BOTH the\
    \ Mention Health section AND the Red Flags section, 3-band sentiment breakdown,\
    \ priority reply queue (max 8 \u2014 troll-cluster members excluded and consolidated\
    \ as a Red Flag), and mandatory bridges to reply-drafter + analytics-summarizer\
    \ in every output. Never auto-replies."
  parameters:
    schema:
      type: object
      properties:
        x_handle:
          type: string
          description: "Creator's X handle (with or without @). Privacy anchor \u2014\
            \ only the creator's handle appears in the rendered output."
        mentions_file:
          type: string
          description: Optional path to a creator-supplied mention export (JSON).
            When omitted the runner emits seeded demo data explicitly marked as such.
        window:
          type: integer
          enum:
          - 7
          - 30
          - 90
          default: 30
          description: Period window in days. 7-day window auto-triggers the Mention
            Audit section.
        compare_to:
          type: string
          enum:
          - previous_period
          - benchmark
          default: previous_period
          description: Comparison basis for volume and sentiment delta calculations.
        sentiment_baseline:
          type: number
          default: 10.0
          description: "Net sentiment score threshold (\u2212100 to +100 scale) below\
            \ which the sentiment-spike paradox fires when volume is also spiking.\
            \ Default 10."
      required:
      - x_handle
cost_limits:
  usd_per_session_max: 0.3
  usd_per_day_max: 1.0
  tokens_per_session_max: 60000
  api_calls_per_session_max: 80
extensions:
  constitution:
  - I
  - II
  - VI
  - VII
  constitution_v215:
    rules:
    - Drafts only. The runner emits a summary the creator reads; it never auto-replies
      to any mention on X.
    - "No fabricated statistics. Demo mention counts carry an explicit [demo mention\
      \ \u2014 re-run with --mentions-file for real X data] label so the creator never\
      \ confuses demo output for their real mention data."
    - "Surface the sentiment-spike paradox in BOTH the Mention Health section AND\
      \ the Red Flags section whenever Mention volume delta is above +30% AND Net\
      \ sentiment score is below the sentiment baseline (default 10). Both conditions\
      \ must be true \u2014 if only one fires, surface each condition in its own row\
      \ instead."
    - "Troll-cluster guard: when \u22655 negative mentions share >60% pairwise Jaccard\
      \ token overlap, exclude them from the priority reply queue and consolidate\
      \ them as a single Red Flag titled 'Coordinated negative cluster' with severity\
      \ 'high' and a specific remediation step."
    - "Priority reply queue is capped at 8 mentions after the troll-cluster filter.\
      \ Troll-cluster members do not count toward the 8-slot cap \u2014 they are surfaced\
      \ exclusively in the Red Flags section."
    - Every output unconditionally includes bridges to both reply-drafter (to draft
      replies to the priority mentions) and analytics-summarizer (to correlate mention
      patterns with broader period metrics). These two bridges are never optional.
    - "Privacy-first: no non-creator X handles appear in the rendered output. Mention\
      \ intent is described in paraphrased terms only \u2014 never raw mention text\
      \ or author handles."
    hard_refusals:
    - auto-reply to any mention without explicit creator consent
    - expose non-creator X handles in the rendered output
    - fabricate mention counts, sentiment scores, or troll-cluster statistics
    - recommend mass-blocking, pile-on engagement, or any pattern X policy would treat
      as abusive or coordinated
    - scrape authenticated X content to seed the mention data
  safety_v215:
    pii_handling: local-only
    data_retention_days: 90
    scanner_severity_floor: warn
    forbidden_actions:
    - scrape_authenticated_x_content
    - auto_reply_to_mention
    - expose_third_party_handles
    - bypass_safety_scanner
    - exfiltrate_user_data
    cost_limits:
      usd_per_session_max: 0.3
      usd_per_day_max: 1.0
      tokens_per_session_max: 60000
      api_calls_per_session_max: 80
    human_in_the_loop:
      enabled: true
      confirm_before:
      - any export of the mention summary to a path outside the agent AppData folder
      - any future-version auto-reply action (currently disabled in v1)
      timeout_seconds: 60
    disclaimers:
      not_financial_advice: false
      not_tax_advice: false
      real_world_action_consent: false
  windows_legacy:
    appdata_folder: grok-agent/mention-summarizer
    cache_folder: grok-agent/mention-summarizer/cache
    log_folder: grok-agent/mention-summarizer/logs
    min_powershell_version: '5.1'
    requires_admin: false
    chrome_only: true
  runtime_dispatch:
    type: python_module
    module: mention_summarizer
  original_kind: creator-template
