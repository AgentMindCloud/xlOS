# Vendored from grok-agent main; migrated v2.15 -> v2.14 + extensions.
version: '2.14'
name: mention-summarizer
description: Local-first mention summarizer for X creators — reads creator-supplied
  X mention data (or seeded demo mentions) and emits a 7/8-section structured summary
  with 4 official Mention Health metrics (Mention volume delta / Net sentiment score
  / Priority reply rate / Authentic reach share), sentiment-spike paradox detection
  in both Mention Health and Red Flags sections, 3-band sentiment breakdown, priority
  reply queue (max 8) with troll-cluster guard (≥5 negative + >60% token overlap →
  Red Flag), a...
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - worker
category: creator-template
cost_limits:
  usd_per_session_max: 0.3
  usd_per_day_max: 1.0
  tokens_per_session_max: 60000
  api_calls_per_session_max: 80
tools:
- name: generate_mention_summary
  type: local_function
  description: Produce a 7-section structured mention summary (or 8-section when troll-cluster
    detected OR window=7d) with 4 official Mention Health metrics, weighted Mention
    Health score, sentiment-spike paradox detection in BOTH the Mention Health section
    AND the Red Flags section, 3-band sentiment breakdown, priority reply queue (max
    8 — troll-cluster members excluded and consolidated as a Red Flag), and mandatory
    bridges to reply-drafter + analytics-summarizer in every output. Never auto-replies.
  module: mention_summarizer.run
  function: generate
extensions:
  xlos_runtime:
    type: python_module
    module: mention_summarizer
