version: '2.14'
name: brand-voice-trainer
description: "Local-first brand voice trainer for X creators \u2014 reads a sample\
  \ of the creator's own past posts and emits a 6/7-section voice profile (tone consistency\
  \ / structure consistency / vocabulary distinctiveness / voice cohesion), tone/structure/vocabulary\
  \ signatures, 3-5 training prompts the creator can paste into other templates, generic-polish\
  \ paradox detection, and >= 3 cross-template bridges. Refuses to train on another\
  \ account's voice."
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - action
  - ide
category: creator-template
tools:
- name: generate_voice_profile
  type: local_function
  module: brand_voice_trainer.run
  function: generate
  description: Produce a 6-section structured voice-profile report (or 7-section when
    red-flag count > 3 OR sample size < 10) with 4 official Voice Profile metrics
    (Tone consistency / Structure consistency / Vocabulary distinctiveness / Voice
    cohesion), tone / structure / vocabulary signature subsections, 3-5 training prompts,
    generic-polish paradox detection, and >= 3 cross-template bridges. Trains only
    on the creator's own posts.
  parameters:
    schema:
      type: object
      properties:
        x_handle:
          type: string
          description: "Creator's X handle (with or without @). The voice belongs\
            \ to the creator \u2014 sample posts must be authored by this handle."
        sample_posts:
          type: array
          items:
            type: string
          description: Optional inline list of post texts authored by --x-handle.
            Each entry is a single post body (no surrounding URL or metadata).
        sample_file:
          type: string
          description: 'Optional path to a newline-delimited file of post texts (lines
            starting with # are ignored).'
        date_range:
          type: string
          description: Optional ISO date range (YYYY-MM-DD/YYYY-MM-DD) used as a deterministic
            seed when no inline sample is provided.
        voice_focus:
          type: string
          enum:
          - tone
          - structure
          - vocabulary
          - all
          default: all
          description: Which of the 3 official signature dimensions to emphasise (the
            4th metric, Voice cohesion, is always reported).
        output_format:
          type: string
          enum:
          - analysis
          - training_prompts
          - both
          default: both
          description: Whether the report includes the analysis + training prompts
            (default), analysis only, or training prompts only.
      required:
      - x_handle
cost_limits:
  usd_per_session_max: 0.3
  usd_per_day_max: 1.0
  tokens_per_session_max: 60000
  api_calls_per_session_max: 80
extensions:
  constitution:
  - I
  - II
  - VI
  - VII
  constitution_v215:
    rules:
    - 'Train only on the creator''s own posts. The runner''s sample-collection layer
      normalises every post to bare text, but the runner''s contract is unambiguous:
      this template is for the creator''s voice, not a copy of someone else''s.'
    - Drafts only. Training prompts emitted by the runner are text the creator pastes
      into other templates. The runner never auto-applies, never auto-publishes.
    - "Surface the generic-polish paradox in BOTH the Voice Profile section AND the\
      \ Red Flags section whenever Voice cohesion > 70 AND Vocabulary distinctiveness\
      \ < 35 (the voice is internally consistent but indistinguishable from niche-default\
      \ \u2014 polished but generic)."
    - Every monetization-related training prompt (e.g. paid-tier funnel voice, sponsorship-content
      voice) carries the Article V.1 'Not financial advice' banner verbatim.
    - "Refuse to score a sample of fewer than 5 posts \u2014 emit guidance, not a\
      \ fabricated profile. Below 10 posts, auto-trigger the optional Voice Audit\
      \ section."
    - Every analysis links to >= 3 cross-template bridges so the creator can apply
      the trained voice elsewhere in Grok Agent OS without copy-paste re-implementation.
    hard_refusals:
    - train on another creator's posts (the system prompt is unambiguous; the runner's
      contract is unambiguous; the manifest binds the unambiguous contract)
    - auto-apply training prompts to any template without explicit user paste
    - fabricate signature phrases the sample did not contain
    - score a sample of fewer than 5 posts as if it were a stable voice profile
    - scrape authenticated X content to build the sample
  safety_v215:
    pii_handling: local-only
    data_retention_days: 90
    scanner_severity_floor: warn
    forbidden_actions:
    - scrape_authenticated_x_content
    - impersonate_user_identity
    - bypass_safety_scanner
    - exfiltrate_user_data
    cost_limits:
      usd_per_session_max: 0.3
      usd_per_day_max: 1.0
      tokens_per_session_max: 60000
      api_calls_per_session_max: 80
    human_in_the_loop:
      enabled: true
      confirm_before:
      - any export of the voice profile to a path outside the agent AppData folder
      timeout_seconds: 60
    disclaimers:
      not_financial_advice: true
      not_tax_advice: false
      real_world_action_consent: false
  windows_legacy:
    appdata_folder: grok-agent/brand-voice-trainer
    cache_folder: grok-agent/brand-voice-trainer/cache
    log_folder: grok-agent/brand-voice-trainer/logs
    min_powershell_version: '5.1'
    requires_admin: false
    chrome_only: true
  runtime_dispatch:
    type: python_module
    module: brand_voice_trainer
  original_kind: creator-template
