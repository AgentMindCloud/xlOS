# Migrated from AgentMindCloud/grok-agent (v2.15 draft) to v2.14 + extensions.
# See docs/migration/v215-to-v214-extensions.md for the field mapping.
version: '2.14'
name: brand-voice-trainer
description: Local-first brand voice trainer for X creators — reads a sample of the
  creator's own past posts and emits a 6/7-section voice profile (tone consistency
  / structure consistency / vocabulary distinctiveness / voice cohesion), tone/structure/vocabulary
  signatures, 3-5 training prompts the creator can paste into other templates, generic-polish
  paradox detection, and >= 3 cross-template bridges. Refuses to train on another
  account's voice.
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - ide
category: creator-template
tools:
- name: generate_voice_profile
cost_limits: &id001
  usd_per_session_max: 0.3
  usd_per_day_max: 1.0
  tokens_per_session_max: 60000
  api_calls_per_session_max: 80
extensions:
  constitution:
    articles:
    - V.1
    rules:
    - 'Train only on the creator''s own posts. The runner''s sample-collection layer
      normalises every post to bare text, but the runner''s contract is unambiguous:
      this template is for the creator''s voice, not a copy of someone else''s.'
    - Drafts only. Training prompts emitted by the runner are text the creator pastes
      into other templates. The runner never auto-applies, never auto-publishes.
    - Surface the generic-polish paradox in BOTH the Voice Profile section AND the
      Red Flags section whenever Voice cohesion > 70 AND Vocabulary distinctiveness
      < 35 (the voice is internally consistent but indistinguishable from niche-default
      — polished but generic).
    - Every monetization-related training prompt (e.g. paid-tier funnel voice, sponsorship-content
      voice) carries the Article V.1 'Not financial advice' banner verbatim.
    - Refuse to score a sample of fewer than 5 posts — emit guidance, not a fabricated
      profile. Below 10 posts, auto-trigger the optional Voice Audit section.
    - Every analysis links to >= 3 cross-template bridges so the creator can apply
      the trained voice elsewhere in Grok Agent OS without copy-paste re-implementation.
    hard_refusals:
    - train on another creator's posts (the system prompt is unambiguous; the runner's
      contract is unambiguous; the manifest binds the unambiguous contract)
    - auto-apply training prompts to any template without explicit user paste
    - fabricate signature phrases the sample did not contain
    - score a sample of fewer than 5 posts as if it were a stable voice profile
    - scrape authenticated X content to build the sample
  x_money_specific:
    disclaimers:
      not_financial_advice: true
      not_tax_advice: false
    cost_limits: *id001
  safety_policy:
    pii_handling: local-only
    data_retention_days: 90
    scanner_severity_floor: warn
    forbidden_actions:
    - scrape_authenticated_x_content
    - impersonate_user_identity
    - bypass_safety_scanner
    - exfiltrate_user_data
    human_in_the_loop:
      enabled: true
      confirm_before:
      - any export of the voice profile to a path outside the agent AppData folder
      timeout_seconds: 60
  runtime_dispatch:
    type: python_module
    module: brand_voice_trainer.run
    note: xlos run dispatches via python -m <module>.
  metadata:
    display_name: Brand Voice Trainer
    tagline: Train your own voice — not a generic-polish replica of the niche.
    categories:
    - creator
    - voice
    - consistency
    tags:
    - creator-template
    - cli-only
    - drafts-only
    - no-other-voices
  migration:
    source_repo: AgentMindCloud/grok-agent
    source_path: templates/creator/brand-voice-trainer/grok-agent.yaml
    source_version: '2.15'
    migrated_at: '2026-05-11'
    tooling: xlOS Phase 3b migrator
