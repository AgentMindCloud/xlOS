# Vendored from grok-agent main; migrated v2.15 -> v2.14 + extensions.
version: '2.14'
name: daily-briefing-agent
description: 'Concise morning briefing for X creators: today''s top signals, niche-relevant
  trends, mention sentiment, action priorities, and 1-3 ready-to-post content ideas.
  Local-first'
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - web
category: creator-template
cost_limits:
  usd_per_session_max: 0.2
  api_calls_per_session_max: 80
tools:
- name: generate_daily_briefing
  type: local_function
  description: 'Produce a structured morning briefing for an X creator: headline,
    5-7 signal bullets, key trends, action priorities, suggested content ideas, sentiment
    overview, and an optional Grok Imagine visual.'
  module: daily_briefing_agent.run
  function: generate
extensions:
  xlos_runtime:
    type: python_module
    module: daily_briefing_agent
