version: '2.14'
name: x-creator-payout-optimizer
description: 'Earnings forecasting, content optimization, and tax estimator for X
  creators. Reads from the X Money Companion Dashboard (Tool #1) and the X Money Vision
  Analyzer (Tool #4) for the richest possible local data.'
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - ide
category: x-money-tool
tools:
- name: forecast_earnings
  type: local_function
  module: x_payout.forecast
  function: forecast
  description: 'Forecast the user''s next-N-day creator earnings using local Tool
    #1 transaction history + Tool #4 receipt history (both read-only) + recent X engagement
    metrics.'
  parameters:
    schema:
      type: object
      properties:
        window_days:
          type: integer
        horizon_days:
          type: integer
      required:
      - window_days
      - horizon_days
- name: optimize_content_topic
  type: local_function
  module: x_payout.optimize
  function: suggest_topic
  description: Suggest content angles for a topic using the user's past engagement
    + payout patterns.
  parameters:
    schema:
      type: object
      properties:
        topic:
          type: string
        audience_profile:
          type: object
      required:
      - topic
- name: estimate_tax_burden
  type: local_function
  module: x_payout.tax
  function: estimate
  description: "Estimate tax burden on creator earnings for a date range. CONSENT-GATED\
    \ export. NOT TAX ADVICE \u2014 the V.2 disclaimer banner is mandatory on every\
    \ output of this tool."
  parameters:
    schema:
      type: object
      properties:
        start_date:
          type: string
        end_date:
          type: string
        jurisdiction:
          type: string
      required:
      - start_date
      - end_date
      - jurisdiction
- name: fetch_x_metrics
  type: local_function
  module: x_payout.metrics
  function: fetch_for_handle
  description: Pull recent X engagement / reach / payouts metrics for the user's handle
    via Grok 4.3 x_search.
  parameters:
    schema:
      type: object
      properties:
        handle:
          type: string
        period_days:
          type: integer
      required:
      - handle
- name: analyze_content_roi
  type: local_function
  module: x_payout.roi
  function: compute
  description: "Compute content ROI by combining Tool #1 revenue rows with Tool #4\
    \ parsed-receipt costs for the same period \u2014 both read-only."
  parameters:
    schema:
      type: object
      properties:
        content_topic:
          type: string
        start_date:
          type: string
        end_date:
          type: string
      required:
      - start_date
      - end_date
cost_limits:
  usd_per_session_max: 1.0
  usd_per_day_max: 5.0
  api_calls_per_session_max: 300
extensions:
  constitution:
  - I
  - II
  - V.1
  - V.2
  - VI
  - VII
  provenance:
    enabled: true
    append_only: true
    cite_sources: true
    contradiction_detection: false
  x_money_specific:
    disclaimers:
      not_financial_advice: true
      not_tax_advice: true
    data_retention_days: 365
  constitution_v215:
    rules:
    - Always show 'Not financial advice' banner on every page (Article V.1).
    - "Always show 'Not tax advice' banner on every page \u2014 tax estimator is a\
      \ primary feature, not an aside (Article V.2)."
    - All earnings, receipt, and forecast data stays local under $env:LOCALAPPDATA\grok-agent\x-creator-payout-optimizer
      (Article VII).
    - 'Cross-tool READS only. Tool #1 (transactions) and Tool #4 (receipts + parsed_items)
      are read-only targets. No cross-tool writes are permitted by this manifest (Article
      III).'
    - Forecast outputs cite the data window and the source rows used. No silent extrapolation
      (Article IV).
    - Tax estimator output explicitly names the jurisdiction and the assumption set
      used; the V.2 banner is part of every export.
    consent_gates:
    - export_tax_estimate
    - sync_to_cloud
  safety_v215:
    pii_handling: local-only
    data_retention_days: 365
    scanner_severity_floor: warn
    disclaimers:
      not_financial_advice: true
      not_tax_advice: true
    cost_limits:
      usd_per_session_max: 1.0
      usd_per_day_max: 5.0
      api_calls_per_session_max: 300
    human_in_the_loop:
      enabled: true
      confirm_before:
      - export_tax_estimate
      - sync_to_cloud
      - any cost above $0.20
      timeout_seconds: 60
  windows_legacy:
    appdata_folder: grok-agent/x-creator-payout-optimizer
    log_folder: grok-agent/x-creator-payout-optimizer/logs
    cache_folder: grok-agent/x-creator-payout-optimizer/cache
    min_powershell_version: '5.1'
    requires_admin: false
    chrome_only: true
  runtime_dispatch:
    type: streamlit_app
    entrypoint: app.py
  original_kind: creator-payout-optimizer
