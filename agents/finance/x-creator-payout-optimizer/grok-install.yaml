# Migrated from AgentMindCloud/grok-agent (v2.15 draft) to v2.14 + extensions.
# See docs/migration/v215-to-v214-extensions.md for the field mapping.
version: '2.14'
name: x-creator-payout-optimizer
description: 'Earnings forecasting, content optimization, and tax estimator for X
  creators. Reads from the X Money Companion Dashboard (Tool #1) and the X Money Vision
  Analyzer (Tool #4) for the richest possible local data.'
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - web
category: x-money-tool
tools:
- name: forecast_earnings
- name: optimize_content_topic
- name: estimate_tax_burden
- name: fetch_x_metrics
- name: analyze_content_roi
cost_limits: &id001
  usd_per_session_max: 1.0
  usd_per_day_max: 5.0
  api_calls_per_session_max: 300
extensions:
  constitution:
    articles:
    - V.1
    - V.2
    - VII
    - III
    - IV
    rules:
    - Always show 'Not financial advice' banner on every page (Article V.1).
    - Always show 'Not tax advice' banner on every page — tax estimator is a primary
      feature, not an aside (Article V.2).
    - All earnings, receipt, and forecast data stays local under $env:LOCALAPPDATA\grok-agent\x-creator-payout-optimizer
      (Article VII).
    - 'Cross-tool READS only. Tool #1 (transactions) and Tool #4 (receipts + parsed_items)
      are read-only targets. No cross-tool writes are permitted by this manifest (Article
      III).'
    - Forecast outputs cite the data window and the source rows used. No silent extrapolation
      (Article IV).
    - Tax estimator output explicitly names the jurisdiction and the assumption set
      used; the V.2 banner is part of every export.
    consent_gates:
    - export_tax_estimate
    - sync_to_cloud
  provenance:
    enabled: true
    append_only: true
    cite_sources: true
    contradiction_detection: false
  x_money_specific:
    disclaimers:
      not_financial_advice: true
      not_tax_advice: true
    cost_limits: *id001
  safety_policy:
    pii_handling: local-only
    data_retention_days: 365
    scanner_severity_floor: warn
    human_in_the_loop:
      enabled: true
      confirm_before:
      - export_tax_estimate
      - sync_to_cloud
      - any cost above $0.20
      timeout_seconds: 60
  runtime_dispatch:
    type: python_module
    module: x_creator_payout_optimizer.run
    note: xlos run dispatches via python -m <module>.
  metadata:
    display_name: X Creator Payout Optimizer
    tagline: Forecast earnings. Optimize content. Estimate taxes.
    categories:
    - finance
    - x-money
    - creator-tools
    tags:
    - streamlit
    - sqlite
    - forecast
    - tax
    - windows-first
    - tool-3
    - cross-tool-reader
  migration:
    source_repo: AgentMindCloud/grok-agent
    source_path: templates/finance/x-creator-payout-optimizer/grok-agent.yaml
    source_version: '2.15'
    migrated_at: '2026-05-11'
    tooling: xlOS Phase 3b migrator
