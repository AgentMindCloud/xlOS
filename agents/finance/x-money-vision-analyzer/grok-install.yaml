# Migrated from AgentMindCloud/grok-agent (v2.15 draft) to v2.14 + extensions.
# See docs/migration/v215-to-v214-extensions.md for the field mapping.
version: '2.14'
name: x-money-vision-analyzer
description: Drag-and-drop vision-powered receipt and statement analyzer. Parses receipts
  with Grok 4.3 vision and one-click imports them into the X Money Companion Dashboard's
  SQLite.
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - web
category: x-money-tool
tools:
- name: parse_receipt
- name: parse_statement
- name: import_to_companion_dashboard
- name: validate_extraction
- name: categorize_parsed_receipt
cost_limits: &id001
  usd_per_session_max: 1.0
  usd_per_day_max: 5.0
  api_calls_per_session_max: 100
extensions:
  constitution:
    articles:
    - V.1
    - V.2
    - II
    - VII
    - IV
    - III
    rules:
    - Always show 'Not financial advice' banner on every page (Article V.1).
    - Always show 'Not tax advice' banner on every export and on the Import preview
      (Article V.2).
    - Never auto-import to the Companion Dashboard. Every batch passes through the
      import_to_companion_dashboard consent gate with an explicit user yes (Article
      II).
    - Receipt images stay local under $env:LOCALAPPDATA\grok-agent\x-money-vision-analyzer\receipts.
      Cloud upload is opt-in only (Article VII).
    - Cite Grok 4.3 vision provenance on every parsed field — extraction is a claim,
      not a fact (Article IV).
    - When the second vision pass disagrees with the first, surface BOTH extractions;
      never silently pick one (Articles III + IV).
    - 'Tool #4 writes to Tool #1''s SQLite via data/import_receipts.py only. No other
      cross-tool writes are permitted by this manifest (Article III).'
    consent_gates:
    - import_to_companion_dashboard
    - sync_to_cloud
  provenance:
    enabled: true
    append_only: true
    cite_sources: true
    contradiction_detection: true
  x_money_specific:
    disclaimers:
      not_financial_advice: true
      not_tax_advice: true
    cost_limits: *id001
  safety_policy:
    pii_handling: redacted-cloud
    data_retention_days: 365
    scanner_severity_floor: warn
    human_in_the_loop:
      enabled: true
      confirm_before:
      - import_to_companion_dashboard
      - sync_to_cloud
      - any cost above $0.20
      timeout_seconds: 60
  runtime_dispatch:
    type: python_module
    module: x_money_vision_analyzer.run
    note: xlos run dispatches via python -m <module>.
  metadata:
    display_name: X Money Vision-Powered Receipt & Statement Analyzer
    tagline: Drag, drop, parse, import.
    categories:
    - finance
    - x-money
    - vision
    - creator-tools
    tags:
    - streamlit
    - sqlite
    - vision
    - grok-4.3
    - windows-first
    - tool-4
    - cross-tool-writer
  migration:
    source_repo: AgentMindCloud/grok-agent
    source_path: templates/finance/x-money-vision-analyzer/grok-agent.yaml
    source_version: '2.15'
    migrated_at: '2026-05-11'
    tooling: xlOS Phase 3b migrator
