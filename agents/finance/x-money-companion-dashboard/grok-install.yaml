version: '2.14'
name: x-money-companion-dashboard
description: "Personal X Money command center on Windows \u2014 overview, transactions,\
  \ analytics, Grok insights, tax export, and alerts."
runtime:
  engine: grok
  model: grok-4.3
deploy:
  targets:
  - ide
category: x-money-tool
tools:
- name: categorize_transaction
  type: local_function
  module: x_money.categorize
  function: categorize
  description: Categorize an X Money transaction using Grok 4.3.
  parameters:
    schema:
      type: object
      properties:
        amount:
          type: number
        counterparty:
          type: string
        memo:
          type: string
      required:
      - amount
      - counterparty
- name: fetch_market_quote
  type: local_function
  module: x_money.market
  function: fetch_quote
  description: Pull a live equity / FX / crypto quote from Yahoo Finance via the local
    wrapper for context next to a transaction.
  parameters:
    schema:
      type: object
      properties:
        ticker:
          type: string
      required:
      - ticker
- name: fetch_relevant_news
  type: local_function
  module: x_money.news
  function: fetch_relevant
  description: Fetch headlines from NewsAPI via the local wrapper to add context for
    a transaction or counterparty.
  parameters:
    schema:
      type: object
      properties:
        query:
          type: string
        from_date:
          type: string
      required:
      - query
- name: build_tax_export
  type: local_function
  module: x_money.tax_export
  function: build_export
  description: Assemble the consent-gated tax CSV/PDF export for a date range. Requires
    explicit user confirmation.
  parameters:
    schema:
      type: object
      properties:
        start_date:
          type: string
        end_date:
          type: string
        format:
          type: string
          enum:
          - csv
          - pdf
      required:
      - start_date
      - end_date
      - format
- name: summarize_alerts
  type: local_function
  module: x_money.alerts
  function: summarize
  description: Summarize the user's pending alerts (in-app, never posted to X without
    consent).
  parameters:
    schema:
      type: object
      properties:
        horizon_days:
          type: integer
      required:
      - horizon_days
cost_limits:
  usd_per_session_max: 0.5
  usd_per_day_max: 2.0
  api_calls_per_session_max: 200
extensions:
  constitution:
  - I
  - II
  - V.1
  - V.2
  - VI
  - VII
  - VIII
  provenance:
    enabled: true
    append_only: true
    cite_sources: true
    contradiction_detection: false
  x_money_specific:
    disclaimers:
      not_financial_advice: true
      not_tax_advice: true
    data_retention_days: 365
  constitution_v215:
    rules:
    - Always show 'Not financial advice' banner on every page (Article V.1).
    - Always show 'Not tax advice' banner on the Tax Export tab (Article V.2).
    - Never share transaction data outside local SQLite without explicit consent.
    - All transactions stay local under $env:LOCALAPPDATA\grok-agent.
    - Cite the source of every market quote and headline shown next to a transaction
      (Article IV).
    - 'The Vision Analyzer (Tool #4) is the only sibling tool permitted to write into
      this SQLite, and only via data/import_receipts.py.'
    consent_gates:
    - export_tax_report
    - sync_to_cloud
  safety_v215:
    pii_handling: local-only
    data_retention_days: 365
    scanner_severity_floor: warn
    disclaimers:
      not_financial_advice: true
      not_tax_advice: true
    cost_limits:
      usd_per_session_max: 0.5
      usd_per_day_max: 2.0
      api_calls_per_session_max: 200
    human_in_the_loop:
      enabled: true
      confirm_before:
      - export_tax_report
      - sync_to_cloud
      - any cost above $0.10
      timeout_seconds: 60
  windows_legacy:
    appdata_folder: grok-agent/x-money-companion-dashboard
    log_folder: grok-agent/x-money-companion-dashboard/logs
    cache_folder: grok-agent/x-money-companion-dashboard/cache
    min_powershell_version: '5.1'
    requires_admin: false
    chrome_only: true
  runtime_dispatch:
    type: streamlit_app
    entrypoint: app.py
  original_kind: finance-dashboard
