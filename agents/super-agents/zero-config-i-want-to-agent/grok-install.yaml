# Migrated from AgentMindCloud/grok-agent (v2.15 draft) to v2.14 + extensions.
# See docs/migration/v215-to-v214-extensions.md for the field mapping.
version: '2.14'
name: zero-config-i-want-to-agent
description: User states a goal in natural language and the agent assembles tools,
  APIs, memory, and workflows with zero configuration.
runtime:
  engine: grok
  model: grok-4
deploy:
  targets:
  - ide
category: super-agent
tools:
- name: parse_intent
- name: assemble_plan
- name: execute_with_consent
cost_limits:
  usd_per_session_max: 1.0
  usd_per_day_max: 5.0
extensions:
  constitution:
    rules:
    - Always confirm understanding before acting on a goal.
    - Show the proposed plan and tool list before any external action.
    - Every external action requires explicit user approval.
    - Maintain a full append-only audit trail of how the goal was achieved.
    consent_gates:
    - publish_synthesis
    - any_real_world_action
    - export_provenance_log
    hard_refusals:
    - Take any real-world action without an explicit user click.
    - Mutate or delete provenance events.
  multi_agent_roles:
    role: orchestrator
    shared_memory: mem0://grok-agent-shared
    max_concurrent_workers: 5
  provenance:
    enabled: true
    log_path: $env:LOCALAPPDATA\grok-agent\zero-config-i-want-to-agent\provenance\events.jsonl
    cite_sources: true
    append_only: true
  safety_policy:
    pii_handling: local-only
    data_retention_days: 365
    scanner_severity_floor: warn
    human_in_the_loop:
      enabled: true
      confirm_before:
      - publish_synthesis
      - any_real_world_action
      - any cost above $0.50
  runtime_dispatch:
    type: python_module
    module: zero_config_i_want_to_agent.run
    note: xlos run dispatches via python -m <module>.
  metadata:
    display_name: Zero-Config I Want To Agent
    tagline: Plain-language goal in, action plan out — zero manual setup.
    categories:
    - super-agent
    - productivity
    tags:
    - super-agent
    - zero-config
    - intent
    - orchestration
  migration:
    source_repo: AgentMindCloud/grok-agent
    source_path: templates/super-agents/zero-config-i-want-to-agent/grok-agent.yaml
    source_version: '2.15'
    migrated_at: '2026-05-11'
    tooling: xlOS Phase 3b migrator
