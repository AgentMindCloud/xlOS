version: '2.14'
name: agent-swarm-with-shared-memory
description: Collaborative swarm of specialised agents that share long-term memory
  and reason together in real time for superior collective intelligence.
runtime:
  engine: grok
  model: grok-4
deploy:
  targets:
  - ide
category: super-agent
tools:
- name: swarm_debate
  type: local_function
  module: orchestrator
  function: AgentSwarm.debate
  description: Runs the six-agent debate loop and returns each agent's contribution
    + the final synthesis.
  parameters:
    schema:
      type: object
      properties:
        question:
          type: string
        rounds:
          type: integer
          default: 3
      required:
      - question
- name: shared_memory_read
  type: local_function
  module: memory
  function: SharedMemory.read
  description: "Reads from the shared mem0 collection. Read-only \u2014 never mutates\
    \ shared memory."
  parameters:
    schema:
      type: object
      properties:
        query:
          type: string
      required:
      - query
- name: shared_memory_append
  type: local_function
  module: memory
  function: SharedMemory.append
  description: Append-only write into the shared mem0 collection.
  parameters:
    schema:
      type: object
      properties:
        fact:
          type: string
        source_id:
          type: string
      required:
      - fact
      - source_id
cost_limits:
  usd_per_session_max: 1.2
  usd_per_day_max: 6.0
extensions:
  constitution:
  - I
  - II
  - III
  - IV
  - VI
  - VII
  - VIII
  multi_agent_roles:
    role: orchestrator
    shared_memory: mem0://grok-agent-shared
    max_concurrent_workers: 6
  provenance:
    enabled: true
    log_path: $env:LOCALAPPDATA\grok-agent\agent-swarm-with-shared-memory\provenance\events.jsonl
    cite_sources: true
    append_only: true
  constitution_v215:
    rules:
    - All agents in the swarm must access the same shared memory.
    - Every final answer must include dissenting opinions from the swarm.
    - Memory is private and never shared externally without explicit consent.
    - Swarm decisions require consensus or a clear majority.
    consent_gates:
    - publish_synthesis
    - export_provenance_log
    hard_refusals:
    - Mutate or delete provenance events.
    - Hide a dissenting agent's opinion from the final response.
  safety_v215:
    pii_handling: local-only
    data_retention_days: 365
    scanner_severity_floor: warn
    cost_limits:
      usd_per_session_max: 1.2
      usd_per_day_max: 6.0
    human_in_the_loop:
      enabled: true
      confirm_before:
      - publish_synthesis
      - export_provenance_log
    disclaimers:
      not_financial_advice: false
      not_tax_advice: false
      real_world_action_consent: true
      not_medical_advice: false
  bridges:
    min_count: 2
    links:
    - living-narrative-fabric
    - provenance-first-trust-engine
    - narrative-contradiction-detector
  memory:
    enabled: true
    provider: mem0
    vector_store:
      backend: qdrant
      collection_prefix: agent-swarm-with-shared-memory
    episodic: true
    semantic: true
    retention_days: 365
    encryption_at_rest: true
  windows_legacy:
    appdata_folder: grok-agent/agent-swarm-with-shared-memory
    log_folder: grok-agent/agent-swarm-with-shared-memory/logs
    default_port: 8512
    chrome_only: true
    requires_admin: false
    min_powershell_version: '5.1'
  runtime_dispatch:
    type: python_module
    module: orchestrator
  original_kind: super-agent
