# Migrated from AgentMindCloud/grok-agent (v2.15 draft) to v2.14 + extensions.
# See docs/migration/v215-to-v214-extensions.md for the field mapping.
version: '2.14'
name: agent-swarm-with-shared-memory
description: Collaborative swarm of specialised agents that share long-term memory
  and reason together in real time for superior collective intelligence.
runtime:
  engine: grok
  model: grok-4
deploy:
  targets:
  - ide
category: super-agent
tools:
- name: swarm_debate
- name: shared_memory_read
- name: shared_memory_append
cost_limits:
  usd_per_session_max: 1.2
  usd_per_day_max: 6.0
extensions:
  constitution:
    rules:
    - All agents in the swarm must access the same shared memory.
    - Every final answer must include dissenting opinions from the swarm.
    - Memory is private and never shared externally without explicit consent.
    - Swarm decisions require consensus or a clear majority.
    consent_gates:
    - publish_synthesis
    - export_provenance_log
    hard_refusals:
    - Mutate or delete provenance events.
    - Hide a dissenting agent's opinion from the final response.
  multi_agent_roles:
    role: orchestrator
    shared_memory: mem0://grok-agent-shared
    max_concurrent_workers: 6
  provenance:
    enabled: true
    log_path: $env:LOCALAPPDATA\grok-agent\agent-swarm-with-shared-memory\provenance\events.jsonl
    cite_sources: true
    append_only: true
  safety_policy:
    pii_handling: local-only
    data_retention_days: 365
    scanner_severity_floor: warn
    human_in_the_loop:
      enabled: true
      confirm_before:
      - publish_synthesis
      - export_provenance_log
  runtime_dispatch:
    type: python_module
    module: agent_swarm_with_shared_memory.run
    note: xlos run dispatches via python -m <module>.
  metadata:
    display_name: Agent Swarm with Shared Memory
    tagline: Six specialised agents · one shared memory · visible debate.
    categories:
    - super-agent
    - intelligence
    tags:
    - super-agent
    - swarm
    - collective-intelligence
    - memory
  migration:
    source_repo: AgentMindCloud/grok-agent
    source_path: templates/super-agents/agent-swarm-with-shared-memory/grok-agent.yaml
    source_version: '2.15'
    migrated_at: '2026-05-11'
    tooling: xlOS Phase 3b migrator
