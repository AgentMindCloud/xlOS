version: '2.14'
name: provenance-first-trust-engine
description: Every response comes with a complete clickable provenance report including
  all sources, confidence scores, and alternative viewpoints for maximum trust and
  transparency.
runtime:
  engine: grok
  model: grok-4
deploy:
  targets:
  - ide
category: super-agent
tools:
- name: trace_claims
  type: local_function
  module: orchestrator
  function: TrustEngine.trace_claims
  description: Decomposes a response into claims and attaches a citation + confidence
    score per claim.
  parameters:
    schema:
      type: object
      properties:
        text:
          type: string
      required:
      - text
- name: verify_source
  type: local_function
  module: orchestrator
  function: TrustEngine.verify_source
  description: Re-fetches a source URL and confirms the claim is still supported by
    it.
  parameters:
    schema:
      type: object
      properties:
        source_id:
          type: string
      required:
      - source_id
- name: render_provenance_report
  type: local_function
  module: orchestrator
  function: TrustEngine.render_provenance_report
  description: "Renders the user-visible Markdown provenance report \u2014 sources,\
    \ confidence, alternatives."
  parameters:
    schema:
      type: object
      properties:
        version_id:
          type: string
      required:
      - version_id
cost_limits:
  usd_per_session_max: 0.8
  usd_per_day_max: 4.0
extensions:
  constitution:
  - I
  - II
  - III
  - IV
  - VI
  - VII
  - VIII
  multi_agent_roles:
    role: orchestrator
    shared_memory: mem0://grok-agent-shared
    max_concurrent_workers: 3
  provenance:
    enabled: true
    log_path: $env:LOCALAPPDATA\grok-agent\provenance-first-trust-engine\provenance\events.jsonl
    cite_sources: true
    versioned_synthesis: true
    contradiction_detection: true
    append_only: true
    langfuse:
      enabled: false
      public_key_env_var: LANGFUSE_PUBLIC_KEY
      secret_key_env_var: LANGFUSE_SECRET_KEY
      host: https://cloud.langfuse.com
  constitution_v215:
    rules:
    - Every claim must have a traceable, append-only provenance record.
    - A confidence score is required for every statement.
    - Alternative viewpoints must be presented when available.
    - Users can click any source to verify.
    consent_gates:
    - export_provenance_log
    - publish_synthesis
    hard_refusals:
    - Emit a claim with empty source_id.
    - Mutate or delete provenance events.
  safety_v215:
    pii_handling: local-only
    data_retention_days: 365
    scanner_severity_floor: warn
    cost_limits:
      usd_per_session_max: 0.8
      usd_per_day_max: 4.0
    human_in_the_loop:
      enabled: true
      confirm_before:
      - export_provenance_log
      - publish_synthesis
    disclaimers:
      not_financial_advice: false
      not_tax_advice: false
      real_world_action_consent: true
      not_medical_advice: false
  bridges:
    min_count: 2
    links:
    - living-narrative-fabric
    - narrative-contradiction-detector
  memory:
    enabled: true
    provider: mem0
    vector_store:
      backend: qdrant
      collection_prefix: provenance-first-trust-engine
    episodic: true
    semantic: true
    retention_days: 365
    encryption_at_rest: true
  windows_legacy:
    appdata_folder: grok-agent/provenance-first-trust-engine
    log_folder: grok-agent/provenance-first-trust-engine/logs
    provenance_folder: grok-agent/provenance-first-trust-engine/provenance
    default_port: 8511
    chrome_only: true
    requires_admin: false
    min_powershell_version: '5.1'
  runtime_dispatch:
    type: python_module
    module: orchestrator
  original_kind: super-agent
