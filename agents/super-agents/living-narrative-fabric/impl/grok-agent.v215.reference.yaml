# Built for xAI, X, Grok and the ecosystem community — Living Narrative Fabric is the
# flagship Super Agent of the Grok Agent OS suite. It produces
# versioned, provenance-first synthesis across X (via Grok 4.3),
# news (NewsAPI + GNews), academia (Semantic Scholar), government
# (data.gov), and the open web (Crawl4AI), and refuses to silently
# resolve contradictions across sources.
#
# Constitution mapping (v1.0 — see constitution.md for the full text):
#   Article I    : Apache-2.0 + xAI-ally line + Windows-first + v2.15 schema
#   Article II   : Source citations are mandatory (ConstitutionViolation on empty source_id)
#   Article III  : Contradictions are never silently resolved
#   Article IV   : Versioned synthesis (parent_version_id chain, full rewind)
#   Article V    : Append-only provenance (JSONL + Mem0 mirror + optional Langfuse)
#   Article V.1  : "Not financial advice" — auto-attached on $XAI-style topics
#   Article VI   : 4-metric Synthesis Confidence formula is locked
#   Article VII  : Mandatory ≥3 cross-template / cross-Super-Agent bridges
#   Article VIII : Audit triggers fire when contradictions > 3 OR sources < 3 OR confidence < 50
#   Article IX   : Human approval is required for every real-world action
#   Article X    : Local-first + privacy-first; all data under $env:LOCALAPPDATA

version: "2.15"
kind: "super-agent"
name: "living-narrative-fabric"
description: "Versioned, provenance-first synthesis across X, news, academia, government, and the open web — with full contradiction detection that never silently picks a winner. Built for xAI, X, Grok and the ecosystem community. ❤️"
author: "@JanSol0s"
license: "Apache-2.0"

# ----------------------------------------------------------------------------
# metadata: discovery + cataloguing
# ----------------------------------------------------------------------------
metadata:
  display_name: "Living Narrative Fabric"
  tagline: "Versioned truth across X, news, academia, and gov data — on Windows."
  categories: ["super-agent", "research", "trust", "narrative"]
  tags: ["streamlit", "mem0", "qdrant", "langfuse", "promptfoo", "deepeval", "windows-first"]
  language: "en"
  homepage: "https://github.com/AgentMindCloud/grok-agent"
  repository: "github.com/AgentMindCloud/grok-agent"
  docs:       "github.com/AgentMindCloud/grok-agent/blob/main/templates/super-agents/living-narrative-fabric/README.md"
  demo_video:
    storyboard: "templates/super-agents/living-narrative-fabric/DEMO.md"
    url: "https://github.com/AgentMindCloud/grok-agent/releases/download/super-agent-demos-v1/living-narrative-fabric-demo.mp4"  # planned — recording + upload pending (target: super-agent-demos-v1 GitHub Release)
    status: "planned — recording + upload pending (target: super-agent-demos-v1 GitHub Release)"
    note: "Actual video has not yet been recorded; once recorded, it will be uploaded as a release asset under tag 'super-agent-demos-v1'."
    update_instructions:
      - "Set metadata.demo_video.status to: available"
      - "Verify metadata.demo_video.url resolves to the released MP4"
      - "Remove the inline 'planned — recording + upload pending' comment next to the URL"
      - "Update README.md demo section: remove 'planned' language and add a runtime + duration line"
      - "Drop this update_instructions field once status is available"
    recording_steps:
      - "Open the agent's UI per the storyboard at metadata.demo_video.storyboard"
      - "Capture with OBS Studio at 1920x1080, 30fps, target duration 90-180 seconds"
