<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1000" width="2400" height="1000" role="img" aria-labelledby="banner-title banner-desc">
  <title id="banner-title">xlOS — cross-platform runtime for Grok agents on X</title>
  <desc id="banner-desc">xlOS Cinnabar Glass v1.0 banner. Dark glassmorphic identity with cinnabar to amber hero gradient on a void background.</desc>

  <defs>
    <radialGradient id="atmos-top-right" cx="70%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#FF7A3D" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF7A3D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="atmos-bottom-left" cx="20%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#C73E1D" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#C73E1D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hero-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF7A3D"/>
      <stop offset="100%" stop-color="#C73E1D"/>
    </linearGradient>
    <filter id="hero-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Void background -->
  <rect width="2400" height="1000" fill="#0D0D0D"/>

  <!-- Atmospheric gradients -->
  <rect width="2400" height="1000" fill="url(#atmos-top-right)"/>
  <rect width="2400" height="1000" fill="url(#atmos-bottom-left)"/>

  <!-- Header strip -->
  <text x="80" y="80"
        font-family="'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace"
        font-size="16"
        font-weight="700"
        letter-spacing="0.1em"
        fill="#F5F5F5"
        fill-opacity="0.6">CINNABAR GLASS · PLATE N° 02 · xlOS</text>

  <!-- Hero wordmark -->
  <text x="1200" y="480"
        font-family="Geist, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="800"
        font-size="200"
        fill="url(#hero-grad)"
        filter="url(#hero-glow)"
        text-anchor="middle">xlOS</text>

  <!-- Subtitle -->
  <text x="1200" y="580"
        font-family="'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace"
        font-size="36"
        font-weight="700"
        letter-spacing="0.05em"
        fill="#F5F5F5"
        text-anchor="middle">CROSS-PLATFORM RUNTIME FOR GROK AGENTS ON X</text>

  <!-- Glass stats panel -->
  <rect x="600" y="780" width="1200" height="100" rx="20"
        fill="#1C1C1E" fill-opacity="0.6"
        stroke="#F5F5F5" stroke-opacity="0.08" stroke-width="1.5"/>
  <text x="1200" y="840"
        font-family="'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace"
        font-size="22"
        font-weight="500"
        letter-spacing="0.08em"
        fill="#F5F5F5"
        fill-opacity="0.9"
        text-anchor="middle">SPEC v2.14  ·  33 AGENTS  ·  3 OSES  ·  APACHE 2.0</text>

  <!-- Footer caption -->
  <text x="2320" y="940"
        font-family="Geist, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-style="italic"
        font-size="24"
        fill="#F5F5F5"
        fill-opacity="0.7"
        text-anchor="end">cross-platform from line one.</text>
</svg>
