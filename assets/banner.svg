<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-labelledby="banner-title banner-desc">
  <title id="banner-title">xlOS — cross-platform developer runtime for Grok agents on X</title>
  <desc id="banner-desc">xlOS Residual Frequencies banner. Halide cyan-blue palette on a deep cool plate background. Frequency curves, registration crosses, monospace plate type.</desc>

  <defs>
    <style>
      .rf-pulse { animation: rf-pulse 8s ease-in-out infinite; transform-origin: center; }
      @keyframes rf-pulse {
        0%, 100% { opacity: 0.55; }
        50%      { opacity: 0.95; }
      }
      .rf-drift-1 { animation: rf-drift-1 55s linear infinite; }
      .rf-drift-2 { animation: rf-drift-2 70s linear infinite; }
      .rf-drift-3 { animation: rf-drift-3 45s linear infinite; }
      @keyframes rf-drift-1 { from { transform: translateX(0); } to { transform: translateX(-160px); } }
      @keyframes rf-drift-2 { from { transform: translateX(0); } to { transform: translateX(160px); } }
      @keyframes rf-drift-3 { from { transform: translateX(0); } to { transform: translateX(-110px); } }
      @media (prefers-reduced-motion: reduce) {
        .rf-pulse, .rf-drift-1, .rf-drift-2, .rf-drift-3 { animation: none; }
      }
    </style>
  </defs>

  <!-- Plate background -->
  <rect width="1280" height="320" fill="#060a0d"/>

  <!-- Plate grid (cool wash, very low alpha) -->
  <g stroke="#d8eef5" stroke-width="0.4" stroke-opacity="0.04">
    <line x1="0"    y1="0"   x2="0"    y2="320"/>
    <line x1="160"  y1="0"   x2="160"  y2="320"/>
    <line x1="320"  y1="0"   x2="320"  y2="320"/>
    <line x1="480"  y1="0"   x2="480"  y2="320"/>
    <line x1="640"  y1="0"   x2="640"  y2="320"/>
    <line x1="800"  y1="0"   x2="800"  y2="320"/>
    <line x1="960"  y1="0"   x2="960"  y2="320"/>
    <line x1="1120" y1="0"   x2="1120" y2="320"/>
    <line x1="1280" y1="0"   x2="1280" y2="320"/>
    <line x1="0"    y1="0"   x2="1280" y2="0"/>
    <line x1="0"    y1="80"  x2="1280" y2="80"/>
    <line x1="0"    y1="160" x2="1280" y2="160"/>
    <line x1="0"    y1="240" x2="1280" y2="240"/>
    <line x1="0"    y1="320" x2="1280" y2="320"/>
  </g>

  <!-- Frequency curves (halide cyan, low alpha, drifting) -->
  <g fill="none" stroke="#2bb3d4" stroke-width="1" stroke-opacity="0.32" stroke-linecap="round">
    <path class="rf-drift-1" d="M -40 230 Q 160 178, 360 230 T 760 230 T 1160 230 T 1560 230"/>
    <path class="rf-drift-2" d="M -40 250 Q 180 296, 380 250 T 780 250 T 1180 250 T 1580 250"/>
    <path class="rf-drift-3" d="M -40 210 Q 140 234, 320 210 T 680 210 T 1040 210 T 1400 210"/>
  </g>

  <!-- Registration crosses (corner marks) -->
  <g stroke="#c6dde8" stroke-width="1.5" class="rf-pulse">
    <!-- top-left -->
    <line x1="20" y1="31" x2="42" y2="31"/>
    <line x1="31" y1="20" x2="31" y2="42"/>
    <!-- top-right -->
    <line x1="1238" y1="31" x2="1260" y2="31"/>
    <line x1="1249" y1="20" x2="1249" y2="42"/>
    <!-- bottom-left -->
    <line x1="20" y1="289" x2="42" y2="289"/>
    <line x1="31" y1="278" x2="31" y2="300"/>
    <!-- bottom-right -->
    <line x1="1238" y1="289" x2="1260" y2="289"/>
    <line x1="1249" y1="278" x2="1249" y2="300"/>
  </g>

  <!-- Top plate strip: residual frequencies marker -->
  <g font-family="'IBM Plex Mono','Courier New',monospace" fill="#c6dde8">
    <text x="64" y="68" font-size="11" font-weight="700" letter-spacing="3.2">RESIDUAL FREQUENCIES // HALIDE</text>
    <text x="1216" y="68" font-size="11" font-weight="400" letter-spacing="2.4" text-anchor="end" fill="#8fb0bf">PLATE NO. 00 // xlOS</text>
  </g>

  <!-- Hairline divider under top strip -->
  <line x1="64" y1="84" x2="1216" y2="84" stroke="#5a7785" stroke-width="1" opacity="0.7"/>

  <!-- Display title: italic serif -->
  <text x="64" y="178"
        font-family="'Instrument Serif',Georgia,serif"
        font-style="italic"
        font-weight="400"
        font-size="92"
        letter-spacing="-1.5"
        fill="#c6dde8">xlOS</text>

  <!-- Accent plate-no, italic serif, halide cyan -->
  <text x="192" y="178"
        font-family="'Instrument Serif',Georgia,serif"
        font-style="italic"
        font-weight="400"
        font-size="76"
        letter-spacing="-1"
        fill="#2bb3d4">.dev</text>

  <!-- Subtitle: uppercase mono -->
  <text x="64" y="212"
        font-family="'IBM Plex Mono','Courier New',monospace"
        font-size="13"
        font-weight="700"
        letter-spacing="3.4"
        fill="#c6dde8">CROSS-PLATFORM DEVELOPER RUNTIME FOR GROK AGENTS ON X</text>

  <!-- Hairline divider above bottom strip -->
  <line x1="64" y1="236" x2="1216" y2="236" stroke="#5a7785" stroke-width="1" opacity="0.7"/>

  <!-- Bottom plate strip: spec/runtime/scanner -->
  <g font-family="'IBM Plex Mono','Courier New',monospace" fill="#8fb0bf">
    <text x="64"   y="262" font-size="11" font-weight="700" letter-spacing="2.6">SPEC v2.14</text>
    <text x="240"  y="262" font-size="11" font-weight="700" letter-spacing="2.6">RUNTIME</text>
    <text x="400"  y="262" font-size="11" font-weight="700" letter-spacing="2.6">SCANNER</text>
    <text x="560"  y="262" font-size="11" font-weight="700" letter-spacing="2.6">33 AGENTS</text>
  </g>

  <!-- Bottom-right caption -->
  <text x="1216" y="262"
        font-family="'Instrument Serif',Georgia,serif"
        font-style="italic"
        font-weight="400"
        font-size="18"
        text-anchor="end"
        fill="#c6dde8">independent community project</text>
</svg>
