name: test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install -e packages/grok_paradoxes
      - name: Pytest (xlos core)
        run: pytest --cov=xlos
      - name: Pytest (grok_paradoxes)
        working-directory: packages/grok_paradoxes
        run: pytest -v
