name: marketplace

on:
  push:
    branches: [main]
    paths:
      - 'marketplace/**'
      - '.github/workflows/marketplace.yml'
  pull_request:
    branches: [main]
    paths:
      - 'marketplace/**'
      - '.github/workflows/marketplace.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketplace
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: marketplace/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketplace
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: marketplace/package-lock.json
      - name: Install
        run: npm ci
      - name: Check Vercel token
        id: token
        run: |
          if [ -n "${VERCEL_TOKEN}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "VERCEL_TOKEN secret not configured — skipping deploy."
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        if: steps.token.outputs.available == 'true'
        run: npx vercel --prod --token="${VERCEL_TOKEN}" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
